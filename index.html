<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garage Pro v8.0 - Final Repair</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; margin: 0; }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 11px; }
        input, select { background: rgba(40, 40, 40, 0.9) !important; color: white !important; border: 1px solid #333 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; margin-bottom: 10px; }
        .hidden { display: none !important; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="pb-24">

<div id="login-screen">
    <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mb-6 shadow-2xl"><i class="fa-solid fa-wrench text-white text-2xl"></i></div>
    <h2 class="text-xl font-black text-orange-500 uppercase italic mb-8">Garage Pro v8.0</h2>
    <div class="w-full max-w-xs space-y-4">
        <input type="password" id="pass-input" placeholder="Password" class="text-center font-bold">
        <button id="btn-login-final" class="orange-gradient w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest">Masuk</button>
    </div>
</div>

<div id="dashboard-content" class="hidden max-w-4xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center"><i class="fa-solid fa-car-side text-white"></i></div>
            <div><h1 class="text-lg font-black italic text-orange-500 uppercase leading-none">Je Garage</h1></div>
        </div>
        <div class="flex gap-2">
            <button id="btn-refresh" class="w-10 h-10 rounded-xl bg-zinc-900 text-orange-500 flex items-center justify-center"><i class="fa-solid fa-sync"></i></button>
            <button id="btn-logout" class="w-10 h-10 rounded-xl bg-zinc-900 text-red-500 flex items-center justify-center"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <nav class="flex gap-6 border-b border-zinc-900 mb-8 overflow-x-auto">
        <div class="tab active" onclick="window.switchTab('tab-database', this)">Database</div>
        <div class="tab" onclick="window.switchTab('tab-servis', this)">Workshop</div>
        <div class="tab" onclick="window.switchTab('tab-stok', this)">Gudang</div>
        <div class="tab" onclick="window.switchTab('tab-finance', this)">Laporan</div>
    </nav>

    <div id="tab-database" class="tab-content">
        <button id="add-pelanggan" class="orange-gradient w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase">+ Pelanggan</button>
        <div id="list-pelanggan" class="space-y-3 mb-8"></div>
        <button id="add-unit" class="bg-zinc-800 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase">+ Unit Mobil</button>
        <div id="list-kendaraan" class="space-y-3"></div>
    </div>

    <div id="tab-servis" class="tab-content hidden">
        <input type="text" id="search-ws" placeholder="Cari Plat..." class="mb-6 text-xs italic">
        <div id="list-workshop" class="space-y-4"></div>
    </div>

    <div id="tab-stok" class="tab-content hidden">
        <button id="add-stok" class="bg-blue-600 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase">+ Stok Barang</button>
        <div class="grid grid-cols-2 gap-4" id="list-stok"></div>
    </div>

    <div id="tab-finance" class="tab-content hidden">
        <div class="flex gap-3 mb-6">
            <select id="filter-finance" class="text-xs flex-1" onchange="window.renderFinance()"><option value="hari">Hari Ini</option><option value="bulan">Bulan Ini</option></select>
            <button id="add-expense" class="bg-red-600 px-4 rounded-xl text-[10px] font-black uppercase italic">Catat Biaya</button>
        </div>
        <div id="finance-summary" class="space-y-4"></div>
        <div id="finance-list" class="space-y-3 mt-8"></div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[10000]">
    <div class="card-dark w-full max-w-lg p-6 rounded-[2.5rem] shadow-2xl">
        <h3 id="modal-title" class="text-xl font-bold text-orange-500 mb-6 uppercase"></h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex flex-col gap-2 mt-8">
            <button id="btn-execute" class="orange-gradient py-4 rounded-xl font-black text-xs uppercase">Simpan</button>
            <button onclick="window.closeModal()" class="bg-zinc-900 py-4 rounded-xl font-bold text-xs text-zinc-500 uppercase">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    
    // Konfigurasi Supabase
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);

    let masterServis = [], masterExp = [];

    // --- FUNGSI UTAMA ---
    window.loadData = async () => {
        try {
            const { data: p } = await supabase.from('pelanggan').select('*').order('nama');
            const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending: false});
            const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
            const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');
            const { data: ex } = await supabase.from('pengeluaran').select('*').order('created_at', {ascending: false});

            masterServis = s || [];
            masterExp = ex || [];

            // Render Pelanggan
            document.getElementById('list-pelanggan').innerHTML = (p || []).map(i => `
                <div class="bg-zinc-900 p-4 rounded-xl flex justify-between"><span>${i.nama}</span><button onclick="window.hapus('pelanggan', '${i.id}')" class="text-zinc-700"><i class="fa-solid fa-trash"></i></button></div>
            `).join('');

            // Render Kendaraan
            document.getElementById('list-kendaraan').innerHTML = (k || []).map(i => `
                <div class="bg-zinc-800/40 p-4 rounded-xl flex justify-between"><div><p class="text-orange-500 font-bold">${i.plat}</p><p class="text-[10px] opacity-40">${i.pelanggan?.nama}</p></div><button onclick="window.openServis('${i.id}', '${i.plat}')" class="orange-gradient px-3 py-1 rounded text-[10px] font-bold">SERVIS</button></div>
            `).join('');

            // Render Gudang
            document.getElementById('list-stok').innerHTML = (st || []).map(i => `
                <div class="card-dark p-4 rounded-xl border-l-4 ${i.jumlah_stok <= 10 ? 'border-red-600' : 'border-blue-600'} flex justify-between"><div><p class="text-[10px] opacity-40">${i.nama_barang}</p><p class="text-lg font-black">${i.jumlah_stok}</p></div><button onclick="window.hapus('stok_sparepart', '${i.id}')" class="text-zinc-700"><i class="fa-solid fa-trash"></i></button></div>
            `).join('');

            window.renderWorkshop();
            window.renderFinance();
        } catch (e) { alert("Koneksi Supabase Bermasalah"); }
    };

    window.switchTab = (id, el) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        el.classList.add('active');
    };

    window.renderWorkshop = () => {
        document.getElementById('list-workshop').innerHTML = masterServis.map(x => {
            const tot = (x.jasa_service || 0) + (x.biaya_sparepart || 0);
            const sisa = tot - (x.uang_muka || 0);
            return `<div class="card-dark p-5 rounded-2xl border-l-4 ${sisa > 0 ? 'border-red-500' : 'border-emerald-500'}">
                <div class="flex justify-between"><div><p class="text-orange-500 font-black">${x.kendaraan?.plat}</p><p class="text-[9px] opacity-40">${x.kendaraan?.pelanggan?.nama}</p></div><button onclick="window.hapus('servis', '${x.id}')" class="text-zinc-700"><i class="fa-solid fa-trash"></i></button></div>
                <div class="mt-4 flex justify-between items-center">${sisa > 0 ? `<button onclick="window.bayarPiutang('${x.id}', ${sisa})" class="bg-red-600 px-3 py-1 rounded text-[10px] font-bold">LUNASI</button>` : '<span class="text-emerald-500 font-bold text-[10px]">LUNAS</span>'}<p class="font-bold">Rp ${sisa.toLocaleString()}</p></div>
            </div>`;
        }).join('');
    };

    window.renderFinance = () => {
        const filter = document.getElementById('filter-finance').value;
        const now = new Date();
        const fS = masterServis.filter(x => { const d = new Date(x.created_at); return filter === 'hari' ? d.toDateString() === now.toDateString() : d.getMonth() === now.getMonth(); });
        const fE = masterExp.filter(x => { const d = new Date(x.created_at); return filter === 'hari' ? d.toDateString() === now.toDateString() : d.getMonth() === now.getMonth(); });

        let tunai = 0, trans = 0, keluar = 0;
        fS.forEach(s => { if(s.metode_bayar === 'Tunai') tunai += Number(s.uang_muka); else trans += Number(s.uang_muka); });
        fE.forEach(e => keluar += Number(e.nominal));

        document.getElementById('finance-summary').innerHTML = `
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-emerald-600/10 p-4 rounded-xl border border-emerald-600/20"><p class="text-[10px] uppercase opacity-50">Tunai Laci</p><p class="text-lg font-black">Rp ${tunai.toLocaleString()}</p></div>
                <div class="bg-blue-600/10 p-4 rounded-xl border border-blue-600/20"><p class="text-[10px] uppercase opacity-50">Transfer</p><p class="text-lg font-black">Rp ${trans.toLocaleString()}</p></div>
            </div>
            <div class="bg-red-600/20 p-4 rounded-xl border border-red-600/30 flex justify-between items-center">
                <div><p class="text-[10px] uppercase font-bold text-red-500">Sisa Saldo Laci (Bersih)</p><p class="text-2xl font-black text-emerald-500">Rp ${(tunai - keluar).toLocaleString()}</p></div>
                <div class="text-right"><p class="text-[10px] uppercase opacity-50">Pengeluaran</p><p class="font-bold">Rp ${keluar.toLocaleString()}</p></div>
            </div>`;
    };

    // --- ACTIONS ---
    document.getElementById('btn-login-final').onclick = () => {
        if(document.getElementById('pass-input').value === MASTER_PASS) {
            localStorage.setItem('garage_auth', 'ok');
            location.reload();
        }
    };

    if(localStorage.getItem('garage_auth') === 'ok') {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard-content').classList.remove('hidden');
        window.loadData();
    }

    document.getElementById('add-pelanggan').onclick = () => {
        window.openModal("Tambah Pelanggan", `<input id="inp-1" placeholder="Nama Lengkap">`, async () => {
            await supabase.from('pelanggan').insert([{ nama: document.getElementById('inp-1').value }]);
            window.closeModal(); window.loadData();
        });
    };

    document.getElementById('add-unit').onclick = async () => {
        const { data: p } = await supabase.from('pelanggan').select('*');
        window.openModal("Tambah Unit", `<select id="inp-1">${p.map(x => `<option value="${x.id}">${x.nama}</option>`).join('')}</select><input id="inp-2" class="uppercase" placeholder="Plat Nomor">`, async () => {
            await supabase.from('kendaraan').insert([{ pelanggan_id: document.getElementById('inp-1').value, plat: document.getElementById('inp-2').value.toUpperCase() }]);
            window.closeModal(); window.loadData();
        });
    };

    document.getElementById('add-stok').onclick = () => {
        window.openModal("Tambah Stok", `<input id="inp-1" placeholder="Nama Barang"><input id="inp-2" type="number" placeholder="Harga"><input id="inp-3" type="number" placeholder="Jumlah">`, async () => {
            await supabase.from('stok_sparepart').insert([{ nama_barang: document.getElementById('inp-1').value, harga_jual_satuan: document.getElementById('inp-2').value, jumlah_stok: document.getElementById('inp-3').value }]);
            window.closeModal(); window.loadData();
        });
    };

    document.getElementById('add-expense').onclick = () => {
        window.openModal("Catat Biaya", `<input id="inp-1" placeholder="Keterangan"><input id="inp-2" type="number" placeholder="Nominal (Rp)">`, async () => {
            await supabase.from('pengeluaran').insert([{ keterangan: document.getElementById('inp-1').value, nominal: document.getElementById('inp-2').value }]);
            window.closeModal(); window.loadData();
        });
    };

    window.openServis = async (uid, plat) => {
        const { data: st } = await supabase.from('stok_sparepart').select('*');
        window.openModal("Input Servis: " + plat, `
            <input id="inp-1" placeholder="Keluhan/Pekerjaan">
            <input id="inp-2" type="number" placeholder="Biaya Jasa (Rp)">
            <select id="inp-3"><option value="">-- Tanpa Part --</option>${st.map(i => `<option value="${i.id}">${i.nama_barang}</option>`).join('')}</select>
            <input id="inp-4" type="number" placeholder="Bayar (Rp)">
            <select id="inp-5"><option value="Tunai">Tunai</option><option value="Transfer">Transfer</option></select>
        `, async () => {
            await supabase.from('servis').insert([{ kendaraan_id: uid, keluhan: document.getElementById('inp-1').value, jasa_service: document.getElementById('inp-2').value || 0, uang_muka: document.getElementById('inp-4').value || 0, metode_bayar: document.getElementById('inp-5').value }]);
            window.closeModal(); window.loadData();
        });
    };

    window.openModal = (title, body, action) => {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = body;
        document.getElementById('modal-container').classList.remove('hidden');
        document.getElementById('btn-execute').onclick = action;
    };

    window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');
    window.hapus = async (t, id) => { if(confirm("Hapus?")) { await supabase.from(t).delete().eq('id', id); window.loadData(); } };
    document.getElementById('btn-refresh').onclick = () => window.loadData();
    document.getElementById('btn-logout').onclick = () => { localStorage.removeItem('garage_auth'); location.reload(); };
</script>
</body>
</html>
