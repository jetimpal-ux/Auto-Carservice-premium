<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Je Garage Pro v9.6 - Auto Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; margin: 0; -webkit-tap-highlight-color: transparent; }
        body::before { content: ""; position: fixed; inset: 0; background: url('https://i.postimg.cc/xCDV3vRZ/car-automobile-repair-shop-engine-motor-vehicle-service-maintenance-auto-parts-6c3120919a9a891118831.png') center/cover; opacity: 0.15; z-index: -1; }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        input, select { background: rgba(30, 30, 30, 0.9) !important; color: white !important; border: 1px solid #444 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .hidden { display: none !important; }
        
        /* Typography */
        .glow-text { text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

<div id="login-screen" class="fixed inset-0 bg-[#050505] z-[1000] flex flex-col items-center justify-center p-6">
    <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mb-6 shadow-2xl rotate-3"><i class="fa-solid fa-car-side text-white text-3xl"></i></div>
    <h2 class="text-xl font-black text-white uppercase italic mb-8 tracking-tighter">Je Garage Pro <span class="text-orange-500">v9.6</span></h2>
    <input type="password" id="pass-input" placeholder="ACCESS KEY" class="text-center font-bold tracking-[0.5em] max-w-xs mb-4">
    <button onclick="window.eksekusiLogin()" class="orange-gradient w-full max-w-xs py-4 rounded-xl font-black text-xs uppercase shadow-lg">Login System</button>
</div>

<div id="dashboard-content" class="hidden max-w-lg mx-auto p-4">
    <header class="flex justify-between items-center mb-8 bg-zinc-900/50 p-4 rounded-2xl border border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center"><i class="fa-solid fa-car-side text-white text-xl"></i></div>
            <div><h1 class="text-lg font-black italic text-white uppercase leading-none">Je Garage <span class="text-orange-500">Pro</span></h1><p class="text-[7px] text-zinc-500 font-bold uppercase mt-1">Management System v9.6</p></div>
        </div>
        <div class="flex gap-2">
            <button onclick="window.loadAll()" class="w-10 h-10 rounded-xl bg-zinc-800 border border-zinc-700 text-orange-500 active:scale-90 transition-transform"><i class="fa-solid fa-sync"></i></button>
            <button onclick="window.eksekusiLogout()" class="w-10 h-10 rounded-xl bg-zinc-800 border border-zinc-700 text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <nav class="flex justify-between border-b border-zinc-900 mb-8 px-2 overflow-x-auto no-scrollbar">
        <div id="btn-tab-database" onclick="window.switchTab('tab-database')" class="tab active">Database</div>
        <div id="btn-tab-servis" onclick="window.switchTab('tab-servis')" class="tab">Workshop</div>
        <div id="btn-tab-stok" onclick="window.switchTab('tab-stok')" class="tab">Gudang</div>
        <div id="btn-tab-finance" onclick="window.switchTab('tab-finance')" class="tab">Laporan</div>
    </nav>

    <div id="tab-database" class="tab-content space-y-4">
        <button onclick="window.openModal('pelanggan')" class="orange-gradient w-full py-5 rounded-2xl font-black text-[11px] uppercase shadow-orange-900/20 shadow-xl">+ Tambah Pelanggan</button>
        <button onclick="window.openModal('kendaraan')" class="bg-zinc-800 w-full py-5 rounded-2xl font-black text-[11px] uppercase border border-zinc-700 shadow-xl">+ Tambah Unit Baru</button>
        <div class="mt-6">
            <h3 class="text-[10px] font-bold text-zinc-500 uppercase mb-4 ml-1 italic tracking-widest">Daftar Unit Aktif</h3>
            <div id="list-kendaraan" class="space-y-3"></div>
        </div>
    </div>

    <div id="tab-servis" class="tab-content hidden">
        <div class="relative mb-6">
            <i class="fa-solid fa-search absolute left-4 top-4 text-zinc-600"></i>
            <input type="text" id="search-ws" placeholder="Cari Plat Nomor atau Nama..." oninput="window.renderWorkshop()" class="pl-12 text-xs italic">
        </div>
        <div id="list-pro-workshop" class="space-y-4"></div>
    </div>

    <div id="tab-finance" class="tab-content hidden">
        <div id="jurnal-summary-area" class="mb-6"></div>
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="window.openModal('tambah_modal')" class="bg-emerald-600/20 text-emerald-500 border border-emerald-500/30 py-4 rounded-2xl text-[10px] font-black uppercase italic">Input Modal</button>
            <button onclick="window.openModal('pengeluaran')" class="bg-red-600/20 text-red-500 border border-red-500/30 py-4 rounded-2xl text-[10px] font-black uppercase italic">Input Biaya</button>
        </div>

        <div class="flex items-center justify-between mb-4 px-2">
            <select id="filter-finance" onchange="window.updateFinanceUI()" class="text-[10px] !w-32 py-2">
                <option value="hari">Hari Ini</option>
                <option value="bulan">Bulan Ini</option>
            </select>
            <button onclick="window.printJurnalReport()" class="text-zinc-500 text-xs font-bold uppercase"><i class="fa-solid fa-print mr-2"></i>Cetak Laporan</button>
        </div>

        <div class="card-dark rounded-[2rem] p-5">
            <h3 class="text-[9px] font-black text-zinc-500 uppercase mb-4 italic tracking-widest">Alur Kas (IN/OUT)</h3>
            <div id="jurnal-flow-body" class="space-y-3 text-[11px]"></div>
        </div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-xl">
    <div class="card-dark w-full max-w-sm p-6 rounded-[2.5rem] border border-white/10 shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <h3 id="modal-title" class="text-lg font-black text-orange-500 uppercase italic">Modal</h3>
            <button onclick="window.closeModal()" class="w-8 h-8 rounded-full bg-zinc-800 text-zinc-500 flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
        </div>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex flex-col gap-3 mt-8">
            <button id="btn-execute" class="orange-gradient py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Simpan Data</button>
            <button onclick="window.closeModal()" class="text-zinc-600 font-bold text-[10px] uppercase py-2">Batalkan</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co", SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);
    const MASTER_PASS = "cuma123"; let keranjang = [], masterS = [], masterE = [];

    window.eksekusiLogin = () => { if(document.getElementById('pass-input').value === MASTER_PASS) { localStorage.setItem('garage_session', 'active'); location.reload(); } };
    window.eksekusiLogout = () => { if(confirm("Keluar dari sistem?")) { localStorage.removeItem('garage_session'); location.reload(); } };
    if(localStorage.getItem('garage_session') === 'active') { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('dashboard-content').classList.remove('hidden'); setTimeout(() => window.loadAll(), 300); }

    window.switchTab = (id) => { 
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden')); 
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
        document.getElementById(id).classList.remove('hidden'); 
        document.getElementById('btn-' + id).classList.add('active'); 
    };

    window.loadAll = async () => {
        const { data: p } = await supabase.from('pelanggan').select('*').order('nama');
        const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('plat');
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
        const { data: ex } = await supabase.from('pengeluaran').select('*').order('created_at', {ascending: false});
        masterS = s || []; masterE = ex || [];
        
        document.getElementById('list-kendaraan').innerHTML = k.map(i => `
            <div class="card-dark p-4 rounded-2xl flex justify-between items-center transition-all active:scale-95">
                <div><p class="text-xs font-black text-orange-500 italic tracking-tighter">${i.plat}</p><p class="text-[9px] text-zinc-500 uppercase font-bold">${i.pelanggan?.nama || '-'}</p></div>
                <button onclick="window.openModal('servis', '${i.id}')" class="bg-orange-500/10 text-orange-500 px-5 py-3 rounded-xl text-[9px] font-black uppercase italic border border-orange-500/20">Servis</button>
            </div>`).join('');
        
        window.renderWorkshop(); window.updateFinanceUI();
    };

    window.renderWorkshop = () => {
        const query = document.getElementById('search-ws').value.toUpperCase();
        const filtered = masterS.filter(x => x.kendaraan?.plat?.toUpperCase().includes(query) || x.kendaraan?.pelanggan?.nama?.toUpperCase().includes(query));
        document.getElementById('list-pro-workshop').innerHTML = filtered.map(x => {
            const tot = (x.jasa_service || 0) + (x.biaya_sparepart || 0), sisa = tot - (x.uang_muka || 0);
            return `<div class="card-dark p-5 rounded-[2rem] border-l-4 ${sisa > 0 ? 'border-red-600' : 'border-emerald-600'}">
                <div class="flex justify-between items-start">
                    <div><h3 class="text-lg font-black text-orange-500 italic tracking-tighter">${x.kendaraan?.plat}</h3><p class="text-[9px] text-zinc-500 font-bold uppercase">${x.kendaraan?.pelanggan?.nama || '-'}</p></div>
                    <button onclick="window.printNotaFull('${x.id}')" class="w-10 h-10 rounded-xl bg-zinc-800 flex items-center justify-center text-orange-500"><i class="fa-solid fa-print"></i></button>
                </div>
                <p class="text-[10px] text-zinc-400 mt-3 italic leading-relaxed">${x.keluhan}</p>
                <div class="mt-4 flex justify-between items-center pt-4 border-t border-white/5">
                    ${sisa > 0 ? `<button onclick="window.bayarSisaModal('${x.id}', ${sisa})" class="bg-red-600 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase">Lunasi Rp ${sisa.toLocaleString()}</button>` : '<span class="text-emerald-500 text-[10px] font-black italic tracking-widest"><i class="fa-solid fa-check-circle mr-1"></i>LUNAS</span>'}
                    <p class="font-black text-xs text-zinc-300">Total: Rp ${tot.toLocaleString()}</p>
                </div></div>`;
        }).join('');
    };

    window.updateFinanceUI = () => {
        const filter = document.getElementById('filter-finance').value;
        const now = new Date();
        const todayStr = now.toDateString();

        // LOGIKA SALDO AWAL (MENGHITUNG SEMUA HARI SEBELUM HARI INI)
        let totalPemasukanDulu = 0, totalPengeluaranDulu = 0;
        masterS.forEach(x => { if(new Date(x.created_at).toDateString() !== todayStr) totalPemasukanDulu += (x.uang_muka || 0); });
        masterE.forEach(x => { 
            const d = new Date(x.created_at);
            if(d.toDateString() !== todayStr) {
                if(x.nominal < 0) totalPemasukanDulu += Math.abs(x.nominal);
                else totalPengeluaranDulu += (x.nominal || 0);
            }
        });
        const saldoAwalHariIni = totalPemasukanDulu - totalPengeluaranDulu;

        // FILTER DATA UNTUK TAMPILAN
        const fS = masterS.filter(x => { 
            const d = new Date(x.created_at); 
            return filter==='hari' ? d.toDateString()===todayStr : d.getMonth()===now.getMonth(); 
        });
        const fE = masterE.filter(x => { 
            const d = new Date(x.created_at); 
            return filter==='hari' ? d.toDateString()===todayStr : d.getMonth()===now.getMonth(); 
        });

        let tunai = 0, bank = 0, keluar = 0, modal = 0;
        fS.forEach(x => { if(x.metode_bayar==='Transfer') bank += (x.uang_muka || 0); else tunai += (x.uang_muka || 0); });
        fE.forEach(x => { if(x.nominal < 0) modal += Math.abs(x.nominal); else keluar += (x.nominal || 0); });
        
        const saldoHariIni = (tunai + modal) - keluar;
        const totalKasFinal = saldoAwalHariIni + saldoHariIni;

        document.getElementById('jurnal-summary-area').innerHTML = `
            <div class="card-dark p-6 rounded-[2.5rem] border-l-4 border-emerald-500 bg-emerald-950/10">
                <p class="text-[8px] text-zinc-500 font-black uppercase mb-1 tracking-widest">Total Saldo Kas (Tunai+TF)</p>
                <h2 class="text-3xl font-black text-emerald-500 tracking-tighter glow-text">Rp ${totalKasFinal.toLocaleString()}</h2>
                <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-white/5">
                    <div><p class="text-[7px] text-zinc-500 font-bold uppercase">Modal Masuk</p><p class="text-xs font-black text-zinc-200 italic">Rp ${modal.toLocaleString()}</p></div>
                    <div><p class="text-[7px] text-zinc-500 font-bold uppercase">Piutang (Belum Lunas)</p><p class="text-xs font-black text-red-500 italic">Rp 0</p></div>
                </div>
            </div>`;

        // LIST ALUR KAS
        let flowHtml = '';
        // Jika filter "Hari Ini", tampilkan saldo awal di baris pertama
        if(filter === 'hari') flowHtml += `<div class="flex justify-between items-center text-zinc-500 italic border-b border-white/5 pb-2"><span>[Sistem] Saldo Awal Hari Ini</span><span class="font-bold">Rp ${saldoAwalHariIni.toLocaleString()}</span></div>`;
        
        fS.forEach(x => {
            flowHtml += `<div class="flex justify-between items-center border-b border-white/5 pb-2"><div><span class="font-black text-zinc-300 uppercase italic text-[10px]">${x.kendaraan?.plat}</span><br><span class="text-[8px] uppercase text-zinc-500 font-bold">${x.metode_bayar}</span></div><span class="font-black text-emerald-500">+Rp ${parseInt(x.uang_muka).toLocaleString()}</span></div>`;
        });
        fE.forEach(x => {
            const isModal = x.nominal < 0;
            flowHtml += `<div class="flex justify-between items-center border-b border-white/5 pb-2"><div><span class="font-bold ${isModal?'text-emerald-400':'text-zinc-400'}">${x.keterangan}</span></div><span class="font-black ${isModal?'text-emerald-500':'text-red-500'}">${isModal?'+':'-'}Rp ${Math.abs(x.nominal).toLocaleString()}</span></div>`;
        });

        document.getElementById('jurnal-flow-body').innerHTML = flowHtml || '<p class="text-center text-zinc-600 text-[10px] py-4">Belum ada transaksi</p>';
    };

    // FUNGSI MODAL & INPUT (SAMA SEPERTI v8.6 DENGAN PENYESUAIAN UI)
    window.openModal = async (type, id = null) => {
        const b = document.getElementById('modal-body'), t = document.getElementById('modal-title'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        
        if(type==='tambah_modal'){ t.innerText="Injeksi Modal"; b.innerHTML=`<input id="m-ket" placeholder="Sumber Modal (Contoh: Kas Peribadi)"><input id="m-nom" type="number" placeholder="Nominal (Rp)">`; btn.onclick=async()=>{ await supabase.from('pengeluaran').insert([{keterangan:"[MODAL] "+document.getElementById('m-ket').value, nominal:-Math.abs(document.getElementById('m-nom').value)}]); window.closeModal(); window.loadAll();};}
        else if(type==='pengeluaran'){ t.innerText="Biaya Operasional"; b.innerHTML=`<input id="e-ket" placeholder="Keterangan Biaya"><input id="e-nom" type="number" placeholder="Nominal (Rp)">`; btn.onclick=async()=>{ await supabase.from('pengeluaran').insert([{keterangan:document.getElementById('e-ket').value, nominal:document.getElementById('e-nom').value}]); window.closeModal(); window.loadAll();};}
        else if(type==='pelanggan'){ t.innerText="Pelanggan Baru"; b.innerHTML=`<input id="p-nama" placeholder="Nama Lengkap">`; btn.onclick=async()=>{ await supabase.from('pelanggan').insert([{nama:document.getElementById('p-nama').value}]); window.closeModal(); window.loadAll();};}
        else if(type==='kendaraan'){ 
            const { data: pL } = await supabase.from('pelanggan').select('*');
            t.innerText="Data Unit"; b.innerHTML=`<select id="p-sel"><option disabled selected>Pilih Pemilik</option>${pL.map(x=>`<option value="${x.id}">${x.nama}</option>`).join('')}</select><input id="p-plat" class="uppercase" placeholder="Plat Nomor (DB 1234 XX)">`;
            btn.onclick=async()=>{ await supabase.from('kendaraan').insert([{pelanggan_id:document.getElementById('p-sel').value, plat:document.getElementById('p-plat').value.toUpperCase()}]); window.closeModal(); window.loadAll();};
        }
        else if(type==='servis'){
            t.innerText="Workshop Input"; b.innerHTML=`<input id="s-kel" placeholder="Deskripsi Pekerjaan"><input id="s-jasa" type="number" placeholder="Jasa Service (Rp)" oninput="window.calc()"><input id="s-part" type="number" placeholder="Total Sparepart (Rp)" oninput="window.calc()"><div class="grid grid-cols-2 gap-2"><select id="s-met"><option value="Tunai">Tunai</option><option value="Transfer">Transfer</option></select><input id="s-bayar" type="number" placeholder="Dibayar (Rp)" oninput="window.calc()"></div><p id="v-sisa" class="text-[10px] text-red-500 font-bold italic">Sisa Tagihan: Rp 0</p>`;
            btn.onclick=async()=>{
                await supabase.from('servis').insert([{kendaraan_id:id, keluhan:document.getElementById('s-kel').value, jasa_service:document.getElementById('s-jasa').value||0, biaya_sparepart:document.getElementById('s-part').value||0, uang_muka:document.getElementById('s-bayar').value||0, metode_bayar:document.getElementById('s-met').value}]);
                window.closeModal(); window.loadAll();
            };
        }
    };

    window.calc = () => {
        const jasa = parseInt(document.getElementById('s-jasa')?.value || 0);
        const part = parseInt(document.getElementById('s-part')?.value || 0);
        const bayar = parseInt(document.getElementById('s-bayar')?.value || 0);
        const sisa = (jasa + part) - bayar;
        document.getElementById('v-sisa').innerText = "Sisa Tagihan: Rp " + sisa.toLocaleString();
    };

    window.closeModal=()=>{ document.getElementById('modal-container').classList.add('hidden'); };
</script>
</body>
</html>
