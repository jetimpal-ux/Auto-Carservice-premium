<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garage Pro v7.7 - Full Accounting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; margin: 0; -webkit-tap-highlight-color: transparent; }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 11px; }
        input, select { background: rgba(40, 40, 40, 0.9) !important; color: white !important; border: 1px solid #333 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .hidden { display: none !important; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        @media print {
            #dashboard-content, #modal-container, #login-screen, nav, header { display: none !important; }
            #print-area { display: block !important; color: black !important; }
        }
    </style>
</head>
<body class="pb-24">

<div id="login-screen">
    <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mb-6 shadow-2xl"><i class="fa-solid fa-screwdriver-wrench text-white text-2xl"></i></div>
    <h2 class="text-xl font-black text-orange-500 uppercase italic mb-8">Garage Pro Login</h2>
    <div class="w-full max-w-xs space-y-4">
        <input type="password" id="pass-input" placeholder="Password" class="text-center font-bold tracking-widest">
        <button id="btn-login-final" class="orange-gradient w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest">Masuk</button>
    </div>
</div>

<div id="print-area" class="hidden p-4"></div>

<div id="dashboard-content" class="hidden max-w-4xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-car-side text-white text-2xl"></i></div>
            <div><h1 class="text-xl font-black italic text-orange-500 uppercase leading-none">Je Garage Pro</h1><p class="text-[8px] text-zinc-500 font-bold uppercase mt-1">v7.7 | Ultimate Edition</p></div>
        </div>
        <div class="flex gap-2">
            <button id="btn-refresh" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-orange-500 flex items-center justify-center"><i class="fa-solid fa-sync"></i></button>
            <button id="btn-logout" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-red-500 flex items-center justify-center"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <nav class="flex gap-6 border-b border-zinc-900 mb-8 overflow-x-auto">
        <div id="btn-tab-database" class="tab active">Database</div>
        <div id="btn-tab-servis" class="tab">Workshop</div>
        <div id="btn-tab-stok" class="tab">Gudang</div>
        <div id="btn-tab-finance" class="tab">Laporan</div>
    </nav>

    <div id="tab-database" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-dark p-5 rounded-[2rem] shadow-lg">
                <button id="add-pelanggan" class="orange-gradient w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase">+ Pelanggan Baru</button>
                <div id="list-pelanggan" class="space-y-3"></div>
            </div>
            <div class="card-dark p-5 rounded-[2rem] shadow-lg">
                <button id="add-unit" class="bg-zinc-800 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase border border-zinc-700">+ Unit Baru</button>
                <div id="list-kendaraan" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="tab-servis" class="tab-content hidden">
        <input type="text" id="search-ws" placeholder="Cari Plat atau Nama..." class="mb-6 text-xs italic">
        <div id="list-workshop" class="space-y-4"></div>
    </div>

    <div id="tab-stok" class="tab-content hidden">
        <button id="add-stok" class="bg-blue-600 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase tracking-widest">+ Stok Gudang</button>
        <div class="grid grid-cols-2 gap-4" id="list-stok"></div>
    </div>

    <div id="tab-finance" class="tab-content hidden">
        <div class="flex gap-3 mb-6">
            <select id="filter-finance" class="text-xs flex-1"><option value="hari">Hari Ini</option><option value="bulan">Bulan Ini</option></select>
            <button id="add-expense" class="bg-red-600 px-4 rounded-xl text-[10px] font-black uppercase">Catat Pengeluaran</button>
        </div>
        
        <div id="finance-stats" class="grid grid-cols-2 gap-3 mb-4"></div>
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <p class="text-[8px] opacity-50 uppercase mb-1">💵 Tunai (Laci)</p>
                <p id="stat-tunai" class="font-bold text-sm">Rp 0</p>
            </div>
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <p class="text-[8px] opacity-50 uppercase mb-1">📱 Transfer / QRIS</p>
                <p id="stat-transfer" class="font-bold text-sm">Rp 0</p>
            </div>
        </div>

        <div class="bg-red-600/10 p-4 rounded-2xl border border-red-600/20 mb-6">
            <div class="flex justify-between items-center">
                <p class="text-[10px] font-black text-red-500 uppercase">Total Pengeluaran</p>
                <p id="stat-expense" class="font-bold text-red-500 text-lg">Rp 0</p>
            </div>
            <div class="flex justify-between items-center mt-2 pt-2 border-t border-red-600/10">
                <p class="text-[10px] font-black text-emerald-500 uppercase">Sisa Uang Di Laci</p>
                <p id="stat-net-laci" class="font-bold text-emerald-500 text-lg">Rp 0</p>
            </div>
        </div>

        <h4 class="text-[10px] font-black uppercase mb-4 opacity-30 italic">Riwayat Transaksi</h4>
        <div id="table-finance-body" class="space-y-3"></div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[3000] backdrop-blur-md">
    <div class="card-dark w-full max-w-lg p-6 rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 id="modal-title" class="text-xl font-bold text-orange-500 mb-6 uppercase italic"></h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex flex-col gap-2 mt-8">
            <button id="btn-execute-modal" class="orange-gradient py-4 rounded-xl font-black text-xs uppercase tracking-widest">Simpan Data</button>
            <button id="btn-close-modal" class="bg-zinc-900 py-4 rounded-xl font-bold text-xs text-zinc-500 uppercase">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVC##.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);

    const MASTER_PASS = "cuma123";
    let keranjang = [];
    let masterServis = [];
    let masterPengeluaran = [];

    // --- AUTH ---
    document.getElementById('btn-login-final').addEventListener('click', () => {
        if(document.getElementById('pass-input').value === MASTER_PASS) {
            localStorage.setItem('garage_v77', 'active');
            location.reload();
        }
    });

    if(localStorage.getItem('garage_v77') === 'active') {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard-content').classList.remove('hidden');
        window.onload = () => loadAll();
    }

    // --- NAV ---
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.getElementById(t.id.replace('btn-', '')).classList.remove('hidden');
            t.classList.add('active');
        });
    });

    // --- LOAD ALL DATA ---
    window.loadAll = async () => {
        const { data: p } = await supabase.from('pelanggan').select('*').order('nama');
        const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending: false});
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
        const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');
        const { data: ex } = await supabase.from('pengeluaran').select('*').order('created_at', {ascending: false});
        
        masterServis = s || [];
        masterPengeluaran = ex || [];

        document.getElementById('list-pelanggan').innerHTML = p.map(i => `<div class="bg-zinc-900/80 p-4 rounded-xl flex justify-between"><span>${i.nama}</span><button onclick="window.hapusData('pelanggan', '${i.id}')" class="text-zinc-800"><i class="fa-solid fa-trash-can"></i></button></div>`).join('');
        document.getElementById('list-kendaraan').innerHTML = k.map(i => `<div class="bg-zinc-800/40 p-4 rounded-xl flex justify-between items-center"><div><p class="text-orange-500 font-bold">${i.plat}</p><p class="text-[9px] opacity-40 uppercase">${i.pelanggan?.nama}</p></div><button onclick="window.openServis('${i.id}', '${i.plat}')" class="orange-gradient px-3 py-1 rounded text-[9px] font-black uppercase">Servis</button></div>`).join('');
        document.getElementById('list-stok').innerHTML = st.map(i => `<div class="card-dark p-4 rounded-2xl border-l-4 ${i.jumlah_stok <= 10 ? 'border-red-600' : 'border-blue-500'} flex justify-between items-center"><div><p class="text-[9px] opacity-40 uppercase">${i.nama_barang}</p><h4 class="text-lg font-black ${i.jumlah_stok <= 10 ? 'text-red-500' : 'text-white'}">${i.jumlah_stok}</h4></div><button onclick="window.hapusData('stok_sparepart', '${i.id}')" class="text-zinc-800"><i class="fa-solid fa-trash-can"></i></button></div>`).join('');
        
        renderWorkshop(masterServis);
        renderFinance();
    };

    const renderWorkshop = (data) => {
        document.getElementById('list-workshop').innerHTML = data.map(x => {
            const tot = (x.jasa_service || 0) + (x.biaya_sparepart || 0);
            const sisa = tot - (x.uang_muka || 0);
            return `<div class="card-dark p-5 rounded-3xl border-l-4 ${sisa > 0 ? 'border-red-600' : 'border-emerald-600'}">
                <div class="flex justify-between">
                    <div><h3 class="text-lg font-black text-orange-500 italic">${x.kendaraan?.plat}</h3><p class="text-[9px] opacity-40 uppercase font-bold">${x.kendaraan?.pelanggan?.nama}</p></div>
                    <div class="flex gap-4"><button onclick="window.hapusData('servis', '${x.id}')" class="text-zinc-800"><i class="fa-solid fa-trash-can"></i></button><button onclick="window.cetakNota('${x.id}')" class="text-orange-500"><i class="fa-solid fa-print"></i></button></div>
                </div>
                <div class="mt-4 flex justify-between items-end pt-3 border-t border-white/5">
                    <div class="flex-1">${sisa > 0 ? `<button onclick="window.openPelunasan('${x.id}', ${sisa})" class="bg-red-600 text-white px-3 py-1 rounded text-[9px] font-black uppercase">Lunasi</button>` : '<span class="text-emerald-500 text-[9px] font-black italic">LUNAS</span>'}</div>
                    <p class="font-black text-sm ${sisa > 0 ? 'text-red-500' : 'text-emerald-500'}">Rp ${sisa.toLocaleString()}</p>
                </div></div>`;
        }).join('');
    };

    // --- WORKSHOP LOGIC (STOK + METODE BAYAR) ---
    window.openServis = async (uid, plat) => {
        keranjang = [];
        const { data: items } = await supabase.from('stok_sparepart').select('*');
        document.getElementById('modal-title').innerText = "Servis: " + plat;
        document.getElementById('modal-body').innerHTML = `
            <input id="in-keluhan" placeholder="Pekerjaan">
            <input id="in-jasa" type="number" placeholder="Jasa (Rp)">
            <div class="bg-black/40 p-4 rounded-2xl">
                <p id="alert-stok" class="text-[9px] text-red-500 font-bold uppercase mb-2 hidden"></p>
                <div class="flex gap-2">
                    <select id="sel-part" class="text-[10px]" onchange="window.cekLimitStok(this)">
                        <option value="">-- Pilih Sparepart --</option>
                        ${items.map(i => `<option value="${i.id}" data-h="${i.harga_jual_satuan}" data-stok="${i.jumlah_stok}">${i.nama_barang} (Stok: ${i.jumlah_stok})</option>`).join('')}
                    </select>
                    <button onclick="window.tambahKeranjang()" class="bg-blue-600 px-4 rounded-xl font-bold">+</button>
                </div>
                <div id="keranjang-list" class="mt-3 space-y-1"></div>
            </div>
            <input id="in-bayar" type="number" placeholder="Bayar Sekarang (Rp)">
            <select id="in-metode"><option value="Tunai">Tunai (Laci)</option><option value="Transfer">Transfer</option></select>
        `;
        document.getElementById('modal-container').classList.remove('hidden');

        document.getElementById('btn-execute-modal').onclick = async () => {
            const btn = document.getElementById('btn-execute-modal');
            btn.disabled = true; btn.innerText = "SEDANG MENYIMPAN...";
            const totPart = keranjang.reduce((a, b) => a + (b.harga * b.qty), 0);
            const { data: s } = await supabase.from('servis').insert([{ kendaraan_id: uid, keluhan: document.getElementById('in-keluhan').value, jasa_service: document.getElementById('in-jasa').value || 0, biaya_sparepart: totPart, uang_muka: document.getElementById('in-bayar').value || 0, metode_bayar: document.getElementById('in-metode').value }]).select().single();
            if(s) {
                for(let it of keranjang) {
                    await supabase.from('detail_servis').insert([{ servis_id: s.id, stok_id: it.stok_id, jumlah: it.qty, harga_satuan: it.harga }]);
                    const { data: itemNow } = await supabase.from('stok_sparepart').select('jumlah_stok').eq('id', it.stok_id).single();
                    await supabase.from('stok_sparepart').update({ jumlah_stok: itemNow.jumlah_stok - it.qty }).eq('id', it.stok_id);
                }
            }
            btn.disabled = false; window.closeModal(); loadAll();
        };
    };

    window.cekLimitStok = (el) => {
        const opt = el.selectedOptions[0];
        const stok = parseInt(opt.dataset.stok);
        const alertBox = document.getElementById('alert-stok');
        if (stok <= 10 && opt.value !== "") {
            alertBox.classList.remove('hidden');
            alertBox.innerText = `!!! STOK ${opt.text.split(' (')[0]} SISA ${stok} !!!`;
        } else alertBox.classList.add('hidden');
    };

    window.tambahKeranjang = () => {
        const s = document.getElementById('sel-part'); const opt = s.selectedOptions[0];
        if(!opt.value) return;
        keranjang.push({ stok_id: opt.value, nama: opt.text.split(' (')[0], harga: parseInt(opt.dataset.h), qty: 1 });
        document.getElementById('keranjang-list').innerHTML = keranjang.map(x => `<div class="flex justify-between text-[10px] bg-white/5 p-2 rounded"><span>${x.nama}</span><span>Rp ${x.harga.toLocaleString()}</span></div>`).join('');
    };

    // --- PENGELUARAN LOGIC ---
    document.getElementById('add-expense').addEventListener('click', () => {
        document.getElementById('modal-title').innerText = "Catat Pengeluaran";
        document.getElementById('modal-body').innerHTML = `
            <input id="ex-ket" placeholder="Keterangan (Contoh: Beli Kopi)">
            <input id="ex-nom" type="number" placeholder="Nominal (Rp)">
        `;
        document.getElementById('modal-container').classList.remove('hidden');
        document.getElementById('btn-execute-modal').onclick = async () => {
            await supabase.from('pengeluaran').insert([{ keterangan: document.getElementById('ex-ket').value, nominal: document.getElementById('ex-nom').value }]);
            window.closeModal(); loadAll();
        };
    });

    // --- FINANCE LOGIC (KAS LACI + PENGELUARAN) ---
    const renderFinance = () => {
        const filter = document.getElementById('filter-finance').value;
        const now = new Date();
        const fServis = masterServis.filter(x => {
            const d = new Date(x.created_at);
            return filter === 'hari' ? d.toDateString() === now.toDateString() : d.getMonth() === now.getMonth();
        });
        const fEx = masterPengeluaran.filter(x => {
            const d = new Date(x.created_at);
            return filter === 'hari' ? d.toDateString() === now.toDateString() : d.getMonth() === now.getMonth();
        });

        let tunai = 0, transfer = 0, piutang = 0, pengeluaran = 0;
        fServis.forEach(x => {
            if(x.metode_bayar === 'Tunai') tunai += parseInt(x.uang_muka || 0);
            else transfer += parseInt(x.uang_muka || 0);
            piutang += ((x.jasa_service + x.biaya_sparepart) - x.uang_muka);
        });
        fEx.forEach(x => pengeluaran += parseInt(x.nominal || 0));

        document.getElementById('finance-stats').innerHTML = `
            <div class="card-dark p-4 rounded-2xl border-l-4 border-emerald-500"><p class="text-[9px] opacity-40 uppercase">Total Masuk</p><h2 class="text-emerald-500 font-black">Rp ${(tunai+transfer).toLocaleString()}</h2></div>
            <div class="card-dark p-4 rounded-2xl border-l-4 border-red-500"><p class="text-[9px] opacity-40 uppercase">Piutang</p><h2 class="text-red-500 font-black">Rp ${piutang.toLocaleString()}</h2></div>
        `;
        document.getElementById('stat-tunai').innerText = "Rp " + tunai.toLocaleString();
        document.getElementById('stat-transfer').innerText = "Rp " + transfer.toLocaleString();
        document.getElementById('stat-expense').innerText = "Rp " + pengeluaran.toLocaleString();
        document.getElementById('stat-net-laci').innerText = "Rp " + (tunai - pengeluaran).toLocaleString();

        const combined = [
            ...fServis.map(s => ({...s, type: 'IN'})),
            ...fEx.map(e => ({...e, type: 'OUT'}))
        ].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

        document.getElementById('table-finance-body').innerHTML = combined.map(x => `
            <div class="bg-zinc-900/40 p-4 rounded-xl flex justify-between items-center">
                <div>
                    <p class="font-bold text-[11px]">${x.type === 'IN' ? x.kendaraan?.plat : x.keterangan}</p>
                    <p class="text-[8px] uppercase font-black ${x.type === 'IN' ? 'text-emerald-500' : 'text-red-500'}">${x.type === 'IN' ? x.metode_bayar : 'Pengeluaran'}</p>
                </div>
                <p class="font-bold text-xs ${x.type === 'IN' ? 'text-white' : 'text-red-500'}">${x.type === 'OUT' ? '-' : ''} Rp ${(x.uang_muka || x.nominal).toLocaleString()}</p>
            </div>
        `).join('');
    };

    // --- OTHER UI LOGIC ---
    document.getElementById('search-ws').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        renderWorkshop(masterServis.filter(x => x.kendaraan?.plat.toLowerCase().includes(q) || x.kendaraan?.pelanggan?.nama.toLowerCase().includes(q)));
    });

    document.getElementById('add-pelanggan').addEventListener('click', () => {
        document.getElementById('modal-title').innerText = "Pelanggan Baru";
        document.getElementById('modal-body').innerHTML = `<input id="new-p-nama" placeholder="Nama Lengkap">`;
        document.getElementById('modal-container').classList.remove('hidden');
        document.getElementById('btn-execute-modal').onclick = async () => { await supabase.from('pelanggan').insert([{ nama: document.getElementById('new-p-nama').value }]); window.closeModal(); loadAll(); };
    });

    document.getElementById('add-unit').addEventListener('click', async () => {
        const { data: pList } = await supabase.from('pelanggan').select('*').order('nama');
        document.getElementById('modal-title').innerText = "Unit Baru";
        document.getElementById('modal-body').innerHTML = `<select id="new-k-pel">${pList.map(p => `<option value="${p.id}">${p.nama}</option>`).join('')}</select><input id="new-k-plat" class="uppercase" placeholder="Plat Nomor">`;
        document.getElementById('modal-container').classList.remove('hidden');
        document.getElementById('btn-execute-modal').onclick = async () => { await supabase.from('kendaraan').insert([{ pelanggan_id: document.getElementById('new-k-pel').value, plat: document.getElementById('new-k-plat').value.toUpperCase() }]); window.closeModal(); loadAll(); };
    });

    document.getElementById('add-stok').addEventListener('click', () => {
        document.getElementById('modal-title').innerText = "Stok Baru";
        document.getElementById('modal-body').innerHTML = `<input id="s-nm" placeholder="Nama Barang"><input id="s-hj" type="number" placeholder="Harga Jual"><input id="s-jm" type="number" placeholder="Jumlah Stok">`;
        document.getElementById('modal-container').classList.remove('hidden');
        document.getElementById('btn-execute-modal').onclick = async () => { await supabase.from('stok_sparepart').insert([{ nama_barang: document.getElementById('s-nm').value, harga_jual_satuan: document.getElementById('s-hj').value, jumlah_stok: document.getElementById('s-jm').value }]); window.closeModal(); loadAll(); };
    });

    window.hapusData = async (table, id) => { if(confirm('Hapus permanen?')) { await supabase.from(table).delete().eq('id', id); loadAll(); } };
    document.getElementById('btn-refresh').addEventListener('click', loadAll);
    document.getElementById('filter-finance').addEventListener('change', renderFinance);
    document.getElementById('btn-logout').addEventListener('click', () => { localStorage.removeItem('garage_v77'); location.reload(); });
    window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');
    document.getElementById('btn-close-modal').addEventListener('click', window.closeModal);
</script>
</body>
</html>
