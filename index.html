<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Je Garage Pro v7.2 - Full Fitur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('https://i.postimg.cc/xCDV3vRZ/car-automobile-repair-shop-engine-motor-vehicle-service-maintenance-auto-parts-6c3120919a9a891118831.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; margin: 0; -webkit-tap-highlight-color: transparent; 
        }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 11px; }
        input, select { background: rgba(30, 30, 30, 0.9) !important; color: white !important; border: 1px solid #444 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .hidden { display: none !important; }
        #login-screen { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        @media print {
            body { background: none !important; color: #000 !important; }
            #dashboard-content, #modal-container, #login-screen, nav, header, button, .no-print { display: none !important; }
            #print-area { display: block !important; color: #000 !important; width: 100%; font-size: 10px; }
            table { border-collapse: collapse; width: 100%; }
            th, td { border: 1px solid black; padding: 4px; text-align: left; }
            th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body class="pb-24">

<div id="login-screen">
    <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-orange-500/20"><i class="fa-solid fa-screwdriver-wrench text-white text-2xl"></i></div>
    <h2 class="text-xl font-black text-orange-500 uppercase italic mb-8">JeGarage Pro Login</h2>
    <div class="w-full max-w-xs space-y-4">
        <input type="password" id="pass-input" placeholder="Password" class="text-center font-bold tracking-widest">
        <button id="btn-login-action" class="orange-gradient w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest">Masuk</button>
        <p id="login-msg" class="text-[10px] text-red-500 text-center font-bold uppercase hidden italic">Password Salah!</p>
    </div>
</div>

<div id="print-area" class="hidden text-black p-4"></div>

<div id="dashboard-content" class="hidden max-w-4xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-car-side text-white text-2xl"></i></div>
            <div>
                <h1 class="text-xl font-black italic text-orange-500 uppercase tracking-tighter leading-none">Je Garage Pro</h1>
                <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest mt-1">v7.2 | Capital Management</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="window.loadAll()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-orange-500 flex items-center justify-center shadow-sm active:scale-95"><i class="fa-solid fa-sync"></i></button>
            <button onclick="window.eksekusiLogout()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-red-500 flex items-center justify-center shadow-sm active:scale-95"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </header>

    <nav class="flex gap-6 border-b border-zinc-900 mb-8 overflow-x-auto no-scrollbar">
        <div id="btn-tab-database" onclick="window.switchTab('tab-database')" class="tab active">Database</div>
        <div id="btn-tab-servis" onclick="window.switchTab('tab-servis')" class="tab">Workshop</div>
        <div id="btn-tab-stok" onclick="window.switchTab('tab-stok')" class="tab">Gudang</div>
        <div id="btn-tab-finance" onclick="window.switchTab('tab-finance')" class="tab">Laporan</div>
    </nav>

    <div id="tab-database" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('pelanggan')" class="orange-gradient w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase shadow-lg">+ Pelanggan Baru</button>
                <div id="list-pelanggan" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
            </div>
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('kendaraan')" class="bg-zinc-800 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase border border-zinc-700">+ Unit Baru</button>
                <div id="list-kendaraan" class="space-y-3 mt-4 max-h-[400px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <div id="tab-servis" class="tab-content hidden">
        <div class="mb-4">
            <input type="text" id="search-ws" placeholder="Cari Plat Nomor..." oninput="window.renderWorkshop()" class="text-xs italic shadow-inner">
        </div>
        <div id="list-pro-workshop" class="space-y-4"></div>
    </div>
    
    <div id="tab-stok" class="tab-content hidden">
        <button onclick="window.openModal('stok')" class="bg-blue-600 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase tracking-widest">+ Stok Gudang</button>
        <div class="grid grid-cols-2 gap-4" id="list-stok"></div>
    </div>

    <div id="tab-finance" class="tab-content hidden">
        <div class="flex gap-2 mb-6">
            <select id="filter-finance" onchange="window.loadAll()" class="text-[10px] flex-1">
                <option value="hari">Hari Ini</option>
                <option value="bulan">Bulan Ini</option>
                <option value="semua">Semua Waktu</option>
            </select>
            <button onclick="window.openModal('tambah_modal')" class="bg-emerald-600 px-3 rounded-xl text-[9px] font-bold uppercase border border-emerald-500 shadow-lg shadow-emerald-600/20">+ Modal</button>
            <button onclick="window.openModal('pengeluaran')" class="bg-red-600 px-3 rounded-xl text-[9px] font-bold uppercase border border-red-500 shadow-lg shadow-red-600/20">Biaya</button>
            <button onclick="window.printFinancialReport()" class="bg-zinc-800 px-3 rounded-xl text-[9px] font-bold uppercase border border-zinc-700"><i class="fa-solid fa-print"></i></button>
        </div>
        <div id="finance-stats" class="grid grid-cols-2 gap-3 mb-6"></div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-dark rounded-3xl p-5">
                <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 tracking-widest italic">Pemasukan</h3>
                <div id="table-finance-body" class="space-y-4"></div>
            </div>
            <div class="card-dark rounded-3xl p-5">
                <h3 class="text-[10px] font-black uppercase text-red-500 mb-4 tracking-widest italic">Biaya & Modal</h3>
                <div id="table-expense-body" class="space-y-4"></div>
            </div>
        </div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-md">
    <div class="card-dark w-full max-w-lg p-6 rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 id="modal-title" class="text-xl font-bold text-orange-500 mb-6 italic uppercase">Modal</h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex flex-col gap-2 mt-8">
            <button id="btn-execute" class="orange-gradient py-4 rounded-xl font-black text-xs uppercase tracking-widest">Simpan Data</button>
            <button onclick="window.closeModal()" class="bg-zinc-900 py-4 rounded-xl font-bold text-xs text-zinc-500 uppercase tracking-widest">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);

    const MASTER_PASS = "cuma123"; 
    let keranjang = [];
    let masterServis = [];
    let masterExpenses = [];

    const eksekusiLogin = () => {
        const input = document.getElementById('pass-input').value.trim();
        if(input === MASTER_PASS) {
            localStorage.setItem('garage_session', 'active');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            window.loadAll();
        } else {
            document.getElementById('login-msg').classList.remove('hidden');
            document.getElementById('pass-input').value = "";
        }
    };

    window.eksekusiLogout = () => {
        if(confirm("Keluar aplikasi?")) {
            localStorage.removeItem('garage_session');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('dashboard-content').classList.add('hidden');
        }
    };

    if(localStorage.getItem('garage_session') === 'active') {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard-content').classList.remove('hidden');
        setTimeout(() => window.loadAll(), 500);
    }

    document.getElementById('btn-login-action').onclick = eksekusiLogin;
    document.getElementById('pass-input').onkeydown = (e) => { if(e.key === 'Enter') eksekusiLogin(); };

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    };

    window.closeModal = () => { document.getElementById('modal-container').classList.add('hidden'); keranjang = []; };

    window.loadAll = async () => {
        try {
            const { data: p } = await supabase.from('pelanggan').select('*').order('created_at', {ascending: false});
            const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending: false});
            const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
            const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');
            const { data: ex } = await supabase.from('pengeluaran').select('*').order('created_at', {ascending: false});

            masterServis = s || [];
            masterExpenses = ex || [];

            document.getElementById('list-pelanggan').innerHTML = (p || []).map(i => `<div class="bg-zinc-900 p-4 rounded-2xl border border-white/5 flex justify-between"><span>${i.nama}</span><button onclick="window.hapus('pelanggan','${i.id}')" class="text-zinc-700 text-xs"><i class="fa-solid fa-trash"></i></button></div>`).join('');
            document.getElementById('list-kendaraan').innerHTML = (k || []).map(i => `<div class="bg-zinc-900/40 p-4 rounded-xl flex justify-between items-center border border-zinc-900 mb-2"><div class="text-xs font-bold text-orange-500">${i.plat}<p class="text-[9px] text-zinc-600 uppercase">${i.pelanggan?.nama || '-'}</p></div><button onclick="window.openModal('servis', '${i.id}')" class="bg-orange-600/10 text-orange-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Servis</button></div>`).join('');
            document.getElementById('list-stok').innerHTML = (st || []).map(i => `<div class="card-dark p-4 rounded-3xl border-l-4 ${i.jumlah_stok < 5 ? 'border-red-600' : 'border-blue-500'} flex justify-between items-center"><div><p class="text-[8px] text-zinc-500 uppercase font-bold">${i.nama_barang}</p><h4 class="text-lg font-black italic">${i.jumlah_stok} <span class="text-[9px] opacity-30">${i.satuan || 'Pcs'}</span></h4></div><button onclick="window.hapus('stok_sparepart','${i.id}')" class="text-zinc-800"><i class="fa-solid fa-trash"></i></button></div>`).join('');

            window.renderWorkshop();

            const filter = document.getElementById('filter-finance').value;
            const now = new Date();
            const filteredS = (s || []).filter(x => {
                const d = new Date(x.created_at);
                if(filter === 'hari') return d.toDateString() === now.toDateString();
                if(filter === 'bulan') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                return true;
            });
            const filteredEx = (ex || []).filter(x => {
                const d = new Date(x.created_at);
                if(filter === 'hari') return d.toDateString() === now.toDateString();
                if(filter === 'bulan') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                return true;
            });

            let tunai = 0, totalKeluar = 0, totalModal = 0;
            filteredS.forEach(x => { if(x.metode_bayar !== 'Transfer') tunai += parseInt(x.uang_muka || 0); });
            filteredEx.forEach(x => {
                if(x.nominal < 0) totalModal += Math.abs(x.nominal);
                else totalKeluar += parseInt(x.nominal || 0);
            });

            const saldoLaci = (tunai + totalModal) - totalKeluar;

            document.getElementById('finance-stats').innerHTML = `
                <div class="col-span-2 card-dark p-6 rounded-[2rem] border-l-4 border-emerald-500">
                    <p class="text-[9px] text-zinc-400 font-bold uppercase mb-1">Saldo Bersih (Laci)</p>
                    <h2 class="text-3xl font-black text-emerald-500 tracking-tighter">Rp ${saldoLaci.toLocaleString()}</h2>
                </div>
                <div class="card-dark p-5 rounded-3xl border-l-4 border-blue-500">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase">Kas Masuk (Servis)</p>
                    <h2 class="text-lg font-black text-blue-500">Rp ${tunai.toLocaleString()}</h2>
                </div>
                <div class="card-dark p-5 rounded-3xl border-l-4 border-red-500">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase">Total Biaya</p>
                    <h2 class="text-lg font-black text-red-500">Rp ${totalKeluar.toLocaleString()}</h2>
                </div>`;

            document.getElementById('table-finance-body').innerHTML = filteredS.map(x => `<div class="flex justify-between items-center border-b border-zinc-900 pb-3"><div><p class="text-xs font-bold">${x.kendaraan?.plat || '-'}</p><p class="text-[9px] ${x.metode_bayar === 'Transfer' ? 'text-blue-500' : 'text-emerald-500'} font-bold uppercase italic">${x.metode_bayar || 'Tunai'}</p></div><p class="text-xs font-black">Rp ${parseInt(x.uang_muka || 0).toLocaleString()}</p></div>`).join('');
            
            document.getElementById('table-expense-body').innerHTML = filteredEx.map(x => {
                const representsModal = x.nominal < 0;
                return `<div class="flex justify-between items-center border-b border-zinc-900 pb-3">
                    <div>
                        <p class="text-xs font-bold ${representsModal ? 'text-emerald-500' : ''}">${x.keterangan}</p>
                        <p class="text-[8px] text-zinc-600">${new Date(x.created_at).toLocaleDateString()}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <p class="text-xs font-black ${representsModal ? 'text-emerald-500' : 'text-red-500'}">
                            ${representsModal ? '+' : '-'} Rp ${Math.abs(x.nominal).toLocaleString()}
                        </p>
                        <button onclick="window.hapus('pengeluaran','${x.id}')" class="text-zinc-800 text-[10px]"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');

        } catch (e) { console.error(e); }
    };

    window.renderWorkshop = () => {
        const query = document.getElementById('search-ws').value.toUpperCase();
        const filtered = masterServis.filter(x => x.kendaraan?.plat?.toUpperCase().includes(query));
        document.getElementById('list-pro-workshop').innerHTML = (filtered || []).slice(0, 30).map(x => {
            const tot = (x.jasa_service || 0) + (x.biaya_sparepart || 0);
            const sisa = tot - (x.uang_muka || 0);
            return `<div class="card-dark p-6 rounded-[2rem] border-l-4 ${sisa > 0 ? 'border-red-600' : 'border-emerald-600'}">
                <div class="flex justify-between items-start">
                    <div><h3 class="text-xl font-black text-orange-500 italic">${x.kendaraan?.plat}</h3><p class="text-[10px] text-zinc-600 uppercase">${x.kendaraan?.pelanggan?.nama || '-'}</p></div>
                    <button onclick="window.printNotaFull('${x.id}')" class="text-orange-500"><i class="fa-solid fa-print"></i></button>
                </div>
                <div class="mt-4 flex justify-between items-end pt-3 border-t border-white/5">
                    <div class="flex-1 mr-4"><p class="text-[10px] opacity-40 italic truncate">${x.keluhan}</p>${sisa > 0 ? `<button onclick="window.bayarSisaModal('${x.id}', ${sisa})" class="bg-red-600/20 text-red-500 px-3 py-1 rounded-lg text-[9px] font-black mt-2">LUNASI</button>` : '<span class="text-emerald-500 text-[10px] font-bold italic uppercase tracking-widest">LUNAS</span>'}</div>
                    <div class="text-right"><p class="font-black ${sisa > 0 ? 'text-red-500' : 'text-emerald-500'} text-sm italic">Rp ${sisa.toLocaleString()}</p></div>
                </div></div>`;
        }).join('');
    };

    window.printFinancialReport = () => {
        const filter = document.getElementById('filter-finance').value;
        const now = new Date();
        let titleReport = "LAPORAN KEUANGAN";
        
        const filteredS = masterServis.filter(x => {
            const d = new Date(x.created_at);
            if(filter === 'hari') { titleReport = "JURNAL HARIAN ("+now.toLocaleDateString()+")"; return d.toDateString() === now.toDateString(); }
            if(filter === 'bulan') { titleReport = "JURNAL BULANAN ("+(now.getMonth()+1)+"/"+now.getFullYear()+")"; return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); }
            return true;
        });

        const filteredEx = masterExpenses.filter(x => {
            const d = new Date(x.created_at);
            if(filter === 'hari') return d.toDateString() === now.toDateString();
            if(filter === 'bulan') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            return true;
        });

        let totalIn = 0;
        let rowsIn = filteredS.map(x => { 
            totalIn += parseInt(x.uang_muka); 
            return `<tr><td>${new Date(x.created_at).toLocaleDateString()}</td><td>${x.kendaraan?.plat || '-'}</td><td>${x.metode_bayar}</td><td align="right">Rp ${parseInt(x.uang_muka).toLocaleString()}</td></tr>`; 
        }).join('');

        let totalOut = 0;
        let totalModal = 0;
        let rowsOut = filteredEx.map(x => { 
            if(x.nominal < 0) {
                totalModal += Math.abs(x.nominal);
                return `<tr><td>${new Date(x.created_at).toLocaleDateString()}</td><td colspan="2"><b style="color:green">[MODAL] ${x.keterangan}</b></td><td align="right">+Rp ${Math.abs(x.nominal).toLocaleString()}</td></tr>`;
            } else {
                totalOut += parseInt(x.nominal); 
                return `<tr><td>${new Date(x.created_at).toLocaleDateString()}</td><td colspan="2">${x.keterangan}</td><td align="right">-Rp ${parseInt(x.nominal).toLocaleString()}</td></tr>`;
            }
        }).join('');

        const saldoBersih = (totalIn + totalModal) - totalOut;

        document.getElementById('print-area').innerHTML = `
            <div style="font-family:monospace; color:black;">
                <center><h2 style="margin:0;">JE GARAGE PRO</h2><p style="margin:5px 0;">${titleReport}</p></center>
                <hr>
                <h4 style="margin:10px 0 5px 0;">A. PEMASUKAN & MODAL</h4>
                <table border="1" style="font-size:10px;">
                    <thead><tr><th>Tgl</th><th>Keterangan</th><th>Metode</th><th>Jumlah</th></tr></thead>
                    <tbody>${rowsIn} ${totalModal > 0 ? `<tr><td>-</td><td>Total Modal Masuk</td><td>-</td><td align="right">Rp ${totalModal.toLocaleString()}</td></tr>` : ''}</tbody>
                    <tfoot><tr><th colspan="3" align="right">Total Inflow</th><th align="right">Rp ${(totalIn+totalModal).toLocaleString()}</th></tr></tfoot>
                </table>

                <h4 style="margin:20px 0 5px 0;">B. PENGELUARAN (BIAYA)</h4>
                <table border="1" style="font-size:10px;">
                    <thead><tr><th>Tgl</th><th colspan="2">Keterangan</th><th>Jumlah</th></tr></thead>
                    <tbody>${rowsOut || '<tr><td colspan="4" align="center">Tidak ada data</td></tr>'}</tbody>
                    <tfoot><tr><th colspan="3" align="right">Total Pengeluaran</th><th align="right">Rp ${totalOut.toLocaleString()}</th></tr></tfoot>
                </table>

                <hr style="margin-top:20px;">
                <table width="100%" style="font-weight:bold; font-size:12px;">
                    <tr><td>RINGKASAN SALDO LACI</td><td align="right"></td></tr>
                    <tr><td>Total Servis (Tunai/DP)</td><td align="right">Rp ${totalIn.toLocaleString()}</td></tr>
                    <tr><td>Injeksi Modal</td><td align="right">Rp ${totalModal.toLocaleString()}</td></tr>
                    <tr><td>Total Pengeluaran</td><td align="right">(Rp ${totalOut.toLocaleString()})</td></tr>
                    <tr style="font-size:14px; border-top:1px solid black;"><td>SALDO BERSIH SAAT INI</td><td align="right">Rp ${saldoBersih.toLocaleString()}</td></tr>
                </table>
                <p style="font-size:8px; margin-top:30px;">Dicetak pada: ${new Date().toLocaleString()}</p>
            </div>`;
        window.print();
    };

    window.printNotaFull = async (id) => {
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').eq('id', id).single();
        const { data: d } = await supabase.from('detail_servis').select('*, stok_sparepart(nama_barang)').eq('servis_id', id);
        const sekarang = new Date();
        const tglCetak = sekarang.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const jamCetak = sekarang.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        const total = (s.jasa_service || 0) + (s.biaya_sparepart || 0);

        document.getElementById('print-area').innerHTML = `
            <div style="font-family:monospace; color:black; width:100%">
                <center><h2 style="margin:0;">JE GARAGE PRO</h2><p style="margin:5px 0; font-size:9px;">Tgl: ${tglCetak} | ${jamCetak}</p></center>
                <hr style="border:0.5px dashed black;">
                <table width="100%" style="font-size:11px;">
                    <tr><td>Plat</td><td>: ${s.kendaraan?.plat}</td></tr>
                    <tr><td>Unit</td><td>: ${s.kendaraan?.pelanggan?.nama}</td></tr>
                </table>
                <hr style="border:0.5px dashed black;">
                <table width="100%" style="font-size:11px;">
                    <tr><td>Jasa Service</td><td align="right">Rp ${s.jasa_service?.toLocaleString()}</td></tr>
                    ${d?.map(i => `<tr><td>${i.stok_sparepart?.nama_barang || 'Part Luar'} (x${i.jumlah})</td><td align="right">Rp ${(i.harga_satuan*i.jumlah).toLocaleString()}</td></tr>`).join('')}
                </table>
                <hr style="border:0.5px dashed black;">
                <table width="100%" style="font-size:11px; font-weight:bold;">
                    <tr><td>Total Tagihan</td><td align="right">Rp ${total.toLocaleString()}</td></tr>
                    <tr><td>Bayar/DP</td><td align="right">Rp ${s.uang_muka?.toLocaleString()}</td></tr>
                    <tr><td>Sisa</td><td align="right">Rp ${(total-s.uang_muka).toLocaleString()}</td></tr>
                </table>
                <hr style="border:0.5px dashed black;">
                <center><p style="font-size:9px;">Terima kasih</p></center>
            </div>`;
        window.print();
    };

    window.openModal = async (type, id = null) => {
        const body = document.getElementById('modal-body'), title = document.getElementById('modal-title'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        
        if(type === 'tambah_modal') {
            title.innerText = "Tambah Modal Kas";
            body.innerHTML = `<input id="mod-ket" placeholder="Keterangan (ex: Modal Awal)"><input id="mod-nom" type="number" placeholder="Nominal Modal (Rp)">`;
            btn.onclick = async () => {
                const nom = document.getElementById('mod-nom').value;
                await supabase.from('pengeluaran').insert([{ keterangan: "[MODAL] " + document.getElementById('mod-ket').value, nominal: -Math.abs(nom) }]);
                window.closeModal(); window.loadAll();
            };
        } else if(type === 'pengeluaran') {
            title.innerText = "Catat Pengeluaran";
            body.innerHTML = `<input id="ex-ket" placeholder="Keterangan Biaya"><input id="ex-nom" type="number" placeholder="Nominal (Rp)">`;
            btn.onclick = async () => {
                await supabase.from('pengeluaran').insert([{ keterangan: document.getElementById('ex-ket').value, nominal: document.getElementById('ex-nom').value }]);
                window.closeModal(); window.loadAll();
            };
        } else if(type === 'pelanggan') {
            title.innerText = "Pelanggan Baru"; body.innerHTML = `<input id="inp-nama" placeholder="Nama Lengkap">`;
            btn.onclick = async () => { await supabase.from('pelanggan').insert([{ nama: document.getElementById('inp-nama').value }]); window.closeModal(); window.loadAll(); };
        } else if(type === 'kendaraan') {
            title.innerText = "Unit Baru";
            const { data: pList } = await supabase.from('pelanggan').select('*').order('created_at', {ascending: false});
            body.innerHTML = `<select id="sel-pel">${pList?.map(x => `<option value="${x.id}">${x.nama}</option>`).join('')}</select><input id="inp-plat" class="uppercase" placeholder="Plat Nomor">`;
            btn.onclick = async () => { await supabase.from('kendaraan').insert([{ pelanggan_id: document.getElementById('sel-pel').value, plat: document.getElementById('inp-plat').value.toUpperCase() }]); window.closeModal(); window.loadAll(); };
        } else if(type === 'servis') {
            title.innerText = "Input Workshop";
            body.innerHTML = `<input id="v-kel" placeholder="Pekerjaan"><input id="v-jasa" type="number" placeholder="Jasa (Rp)" oninput="window.calc()"><div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800"><p class="text-[9px] text-zinc-500 mb-2 uppercase font-bold tracking-widest">Sparepart</p><div id="spare-input-area"></div><div id="basket-list" class="mt-4 space-y-2"></div></div>
            <div class="grid grid-cols-2 gap-2"><select id="v-metode"><option value="Tunai">💰 Tunai</option><option value="Transfer">🏦 Transfer</option></select><input id="v-bayar" type="number" placeholder="Bayar" oninput="window.calc()"></div><p id="v-sisa" class="text-xs text-red-500 font-bold italic">Sisa: Rp 0</p>`;
            window.updateSpareInput(false);
            btn.onclick = async () => {
                const totalPart = keranjang.reduce((acc, curr) => acc + (curr.harga * curr.qty), 0);
                const { data: n } = await supabase.from('servis').insert([{ kendaraan_id: id, keluhan: document.getElementById('v-kel').value, jasa_service: document.getElementById('v-jasa').value || 0, biaya_sparepart: totalPart, uang_muka: document.getElementById('v-bayar').value || 0, metode_bayar: document.getElementById('v-metode').value }]).select().single();
                for(let it of keranjang) {
                    await supabase.from('detail_servis').insert([{ servis_id: n.id, stok_id: it.stok_id, jumlah: it.qty, harga_satuan: it.harga }]);
                    if(it.stok_id) {
                        const { data: cur } = await supabase.from('stok_sparepart').select('jumlah_stok').eq('id', it.stok_id).single();
                        await supabase.from('stok_sparepart').update({ jumlah_stok: (cur?.jumlah_stok || 0) - it.qty }).eq('id', it.stok_id);
                    }
                }
                window.closeModal(); window.loadAll();
            };
        } else if(type === 'stok') {
            title.innerText = "Tambah Stok"; body.innerHTML = `<input id="s-nama" placeholder="Nama Barang"><input id="s-satuan" placeholder="Satuan"><input id="s-harga" type="number" placeholder="Harga Jual"><input id="s-jumlah" type="number" placeholder="Jumlah Stok">`;
            btn.onclick = async () => { await supabase.from('stok_sparepart').insert([{ nama_barang: document.getElementById('s-nama').value, satuan: document.getElementById('s-satuan').value, harga_jual_satuan: document.getElementById('s-harga').value, jumlah_stok: document.getElementById('s-jumlah').value }]); window.closeModal(); window.loadAll(); };
        }
    };

    window.updateSpareInput = async (manual) => {
        const area = document.getElementById('spare-input-area');
        if(manual) {
            area.innerHTML = `<input id="m-nama" placeholder="Barang Luar" class="mb-2"><div class="flex gap-2"><input id="m-harga" type="number" placeholder="Harga"><input id="m-qty" type="number" value="1" class="w-16"><button onclick="window.addManual()" class="orange-gradient px-4 rounded-xl font-bold">+</button></div><button onclick="window.updateSpareInput(false)" class="text-[9px] text-blue-400 mt-2 underline">Cek Gudang</button>`;
        } else {
            const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');
            area.innerHTML = `<div class="flex gap-2"><select id="v-spare" class="flex-1 text-[10px]"><option value="">-- Pilih Part --</option>${st?.map(x => `<option value="${x.id}" data-harga="${x.harga_jual_satuan}">${x.nama_barang} (${x.jumlah_stok})</option>`).join('')}</select><input id="v-qty" type="number" value="1" class="w-16"><button onclick="window.addGudang()" class="bg-blue-600 px-4 rounded-xl font-bold">+</button></div><button onclick="window.updateSpareInput(true)" class="text-[9px] text-orange-400 mt-2 underline">+ Barang Luar</button>`;
        }
    };

    window.addGudang = () => {
        const s = document.getElementById('v-spare'); const sel = s.selectedOptions[0]; if(!sel.value) return;
        keranjang.push({ stok_id: sel.value, nama: sel.text.split(' (')[0], harga: parseInt(sel.dataset.harga), qty: parseInt(document.getElementById('v-qty').value) });
        window.renderBasket(); window.calc();
    };

    window.addManual = () => {
        const n = document.getElementById('m-nama').value, h = parseInt(document.getElementById('m-harga').value), q = parseInt(document.getElementById('m-qty').value);
        if(!n || h <= 0) return;
        keranjang.push({ stok_id: null, nama: n, harga: h, qty: q });
        window.renderBasket(); window.calc();
    };

    window.renderBasket = () => { document.getElementById('basket-list').innerHTML = keranjang.map(i => `<div class="flex justify-between text-[10px] bg-white/5 p-2 rounded"><span>${i.nama} x${i.qty}</span><span>Rp ${(i.harga*i.qty).toLocaleString()}</span></div>`).join(''); };
    window.calc = () => {
        const totalPart = keranjang.reduce((acc, curr) => acc + (curr.harga * curr.qty), 0);
        const total = totalPart + parseInt(document.getElementById('v-jasa')?.value || 0);
        const sisa = total - parseInt(document.getElementById('v-bayar')?.value || 0);
        document.getElementById('v-sisa').innerText = "Sisa Tagihan: Rp " + sisa.toLocaleString();
    };
    window.bayarSisaModal = (id, sisaAwal) => {
        const title = document.getElementById('modal-title'), body = document.getElementById('modal-body'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        title.innerText = "Pelunasan";
        body.innerHTML = `<p class="text-red-500 font-bold">Tagihan: Rp ${sisaAwal.toLocaleString()}</p><select id="v-metode-pelunasan"><option value="Tunai">Tunai</option><option value="Transfer">Transfer</option></select><input id="v-pelunasan" type="number" placeholder="Nominal">`;
        btn.onclick = async () => {
            const { data: cur } = await supabase.from('servis').select('*').eq('id', id).single();
            await supabase.from('servis').update({ uang_muka: parseInt(cur.uang_muka) + parseInt(document.getElementById('v-pelunasan').value || 0), metode_bayar: document.getElementById('v-metode-pelunasan').value }).eq('id', id);
            window.closeModal(); window.loadAll();
        };
    };
    window.hapus = async (table, id) => { if(confirm("Hapus data?")) { await supabase.from(table).delete().eq('id', id); window.loadAll(); } };
</script>
</body>
</html>
