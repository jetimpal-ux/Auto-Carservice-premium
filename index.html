<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garage Pro v8.2 - Full Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; margin: 0; -webkit-tap-highlight-color: transparent; }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: #111; border: 1px solid #222; border-radius: 1.5rem; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 8px; font-weight: 800; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .tab.active { opacity: 1; border-bottom: 3px solid #f97316; color: #f97316; }
        input, select { background: #1a1a1a !important; color: #fff !important; border: 1px solid #333 !important; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .hidden { display: none !important; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; color: black !important; } }
    </style>
</head>
<body class="pb-24">

<div id="print-area" class="hidden p-4 text-black bg-white"></div>

<div id="main-app" class="max-w-xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-500/20"><i class="fa-solid fa-screwdriver-wrench text-white text-xl"></i></div>
            <div><h1 class="text-xl font-black italic text-orange-500 uppercase leading-none">Je Garage</h1><p class="text-[8px] text-zinc-500 font-bold uppercase mt-1">v8.2 Full Feature</p></div>
        </div>
        <button onclick="location.reload()" class="w-10 h-10 bg-zinc-900 rounded-xl text-orange-500 border border-zinc-800 flex items-center justify-center"><i class="fa-solid fa-sync"></i></button>
    </header>

    <nav class="flex gap-6 border-b border-zinc-900 mb-8 overflow-x-auto no-scrollbar">
        <div id="t-db" class="tab active" onclick="switchTab('db')">Database</div>
        <div id="t-ws" class="tab" onclick="switchTab('ws')">Workshop</div>
        <div id="t-st" class="tab" onclick="switchTab('st')">Gudang</div>
        <div id="t-fn" class="tab" onclick="switchTab('fn')">Laporan</div>
    </nav>

    <div id="sec-db" class="tab-content">
        <div class="grid grid-cols-1 gap-4">
            <div class="card-dark p-5">
                <button onclick="openModal('Pelanggan')" class="orange-gradient w-full py-4 rounded-xl font-black text-[10px] uppercase mb-6">+ Tambah Pelanggan</button>
                <div id="list-pelanggan" class="space-y-2"></div>
            </div>
            <div class="card-dark p-5">
                <button onclick="openModal('Unit')" class="bg-zinc-800 w-full py-4 rounded-xl font-black text-[10px] uppercase mb-6 border border-zinc-700">+ Tambah Unit Mobil</button>
                <div id="list-unit" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="sec-ws" class="tab-content hidden">
        <input type="text" id="search-ws" oninput="renderWorkshop()" placeholder="Cari Plat Mobil..." class="mb-6 text-sm italic">
        <div id="list-workshop" class="space-y-4"></div>
    </div>

    <div id="sec-st" class="tab-content hidden">
        <button onclick="openModal('Stok')" class="bg-blue-600 w-full py-4 rounded-xl font-black text-[10px] uppercase mb-6">+ Stok Sparepart Baru</button>
        <div id="list-stok" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="sec-fn" class="tab-content hidden">
        <div class="flex gap-2 mb-6">
            <button onclick="openModal('Biaya')" class="bg-red-600 flex-1 py-3 rounded-xl font-black text-[10px] uppercase">Catat Biaya</button>
            <button onclick="window.print()" class="bg-zinc-800 px-6 rounded-xl border border-zinc-700"><i class="fa-solid fa-print"></i></button>
        </div>
        <div id="finance-summary" class="space-y-3"></div>
        <div id="finance-log" class="mt-8 space-y-2"></div>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[1000] backdrop-blur-md">
    <div class="bg-zinc-900 w-full max-w-sm p-6 rounded-[2.5rem] border border-zinc-800 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 id="m-title" class="text-orange-500 font-black mb-6 uppercase italic tracking-widest text-center"></h3>
        <div id="m-body" class="space-y-4"></div>
        <div class="flex flex-col gap-2 mt-8">
            <button id="m-btn-save" class="orange-gradient py-4 rounded-xl font-black text-xs tracking-widest uppercase">Simpan Data</button>
            <button onclick="closeModal()" class="text-zinc-500 font-bold py-2 text-xs uppercase">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);

    let M_SERVIS = [], M_EXP = [], M_STOK = [], KERANJANG = [];

    // --- MAIN ENGINE ---
    window.fetchAll = async () => {
        const [p, k, st, s, ex] = await Promise.all([
            supabase.from('pelanggan').select('*').order('nama'),
            supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending: false}),
            supabase.from('stok_sparepart').select('*').order('nama_barang'),
            supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false}),
            supabase.from('pengeluaran').select('*').order('created_at', {ascending: false})
        ]);

        M_STOK = st.data || [];
        M_SERVIS = s.data || [];
        M_EXP = ex.data || [];

        // Render Database
        document.getElementById('list-pelanggan').innerHTML = p.data?.map(i => `<div class="bg-zinc-900/50 p-3 rounded-xl flex justify-between border border-white/5"><span>${i.nama}</span><button onclick="hapusData('pelanggan','${i.id}')" class="text-zinc-800"><i class="fa-solid fa-trash"></i></button></div>`).join('') || '';
        document.getElementById('list-unit').innerHTML = k.data?.map(i => `<div class="bg-zinc-900 p-3 rounded-xl flex justify-between border border-white/5"><div><p class="text-orange-500 font-bold">${i.plat}</p><p class="text-[9px] opacity-40 uppercase">${i.pelanggan?.nama}</p></div><button onclick="openFormServis('${i.id}','${i.plat}')" class="orange-gradient px-4 rounded-lg font-black text-[9px] uppercase">Servis</button></div>`).join('') || '';

        // Render Stok
        document.getElementById('list-stok').innerHTML = M_STOK.map(i => `
            <div class="card-dark p-4 border-l-4 ${i.jumlah_stok <= 5 ? 'border-red-600' : 'border-blue-600'}">
                <p class="text-[9px] opacity-40 uppercase font-bold">${i.nama_barang}</p>
                <div class="flex justify-between items-end">
                    <p class="text-xl font-black">${i.jumlah_stok}</p>
                    <button onclick="hapusData('stok_sparepart','${i.id}')" class="text-zinc-800 text-xs"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>`).join('');

        renderWorkshop();
        renderFinance();
    };

    window.renderWorkshop = () => {
        const q = document.getElementById('search-ws').value.toLowerCase();
        const filtered = M_SERVIS.filter(x => x.kendaraan?.plat.toLowerCase().includes(q));
        document.getElementById('list-workshop').innerHTML = filtered.map(x => {
            const total = (x.jasa_service + x.biaya_sparepart);
            const sisa = total - x.uang_muka;
            return `
            <div class="card-dark p-5 border-l-4 ${sisa > 0 ? 'border-red-600' : 'border-emerald-600'}">
                <div class="flex justify-between">
                    <div><h3 class="text-lg font-black text-orange-500 italic uppercase">${x.kendaraan?.plat}</h3><p class="text-[9px] opacity-40 uppercase font-black">${x.kendaraan?.pelanggan?.nama}</p></div>
                    <div class="flex gap-3">
                        <button onclick="cetakNota('${x.id}')" class="text-orange-500"><i class="fa-solid fa-print"></i></button>
                        <button onclick="hapusData('servis','${x.id}')" class="text-zinc-800"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
                    <div>${sisa > 0 ? `<button onclick="prosesLunas('${x.id}',${sisa})" class="bg-red-600 px-3 py-1 rounded text-[9px] font-black uppercase">Bayar Sisa</button>` : '<span class="text-emerald-500 font-black text-[9px] italic">LUNAS</span>'}</div>
                    <div class="text-right"><p class="text-[8px] opacity-30 uppercase font-bold">Total Tagihan</p><p class="font-black">Rp ${total.toLocaleString()}</p></div>
                </div>
            </div>`;
        }).join('');
    };

    window.renderFinance = () => {
        let tunai = 0, transfer = 0, keluar = 0, piutang = 0;
        M_SERVIS.forEach(s => {
            if(s.metode_bayar === 'Tunai') tunai += Number(s.uang_muka);
            else transfer += Number(s.uang_muka);
            piutang += ( (s.jasa_service + s.biaya_sparepart) - s.uang_muka );
        });
        M_EXP.forEach(e => keluar += Number(e.nominal));

        document.getElementById('finance-summary').innerHTML = `
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-emerald-600/10 p-4 rounded-2xl border border-emerald-600/20"><p class="text-[9px] uppercase font-black opacity-50">Kas Laci</p><p class="text-lg font-black">Rp ${tunai.toLocaleString()}</p></div>
                <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-600/20"><p class="text-[9px] uppercase font-black opacity-50">Transfer</p><p class="text-lg font-black">Rp ${transfer.toLocaleString()}</p></div>
            </div>
            <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 flex justify-between items-center">
                <div><p class="text-[10px] uppercase font-black text-red-500">Total Piutang</p><p class="text-xl font-black text-red-500">Rp ${piutang.toLocaleString()}</p></div>
                <div class="text-right"><p class="text-[10px] uppercase font-black text-emerald-500">Saldo Bersih</p><p class="text-xl font-black text-emerald-500">Rp ${(tunai - keluar).toLocaleString()}</p></div>
            </div>`;
    };

    // --- FORM LOGIC (WORKSHOP WITH SPAREPART DROPDOWN) ---
    window.openFormServis = (uid, plat) => {
        KERANJANG = [];
        const m = document.getElementById('modal');
        document.getElementById('m-title').innerText = "INPUT SERVIS: " + plat;
        document.getElementById('m-body').innerHTML = `
            <input id="f-kel" placeholder="Pekerjaan / Keluhan">
            <input id="f-jas" type="number" placeholder="Biaya Jasa (Rp)">
            <div class="bg-black/50 p-4 rounded-2xl border border-zinc-800">
                <p class="text-[9px] font-black uppercase text-zinc-500 mb-2">Pilih Sparepart</p>
                <div class="flex gap-2">
                    <select id="f-part-sel" class="text-xs">
                        <option value="">-- Pilih Part --</option>
                        ${M_STOK.map(s => `<option value="${s.id}" data-harga="${s.harga_jual_satuan}">${s.nama_barang} (Stok: ${s.jumlah_stok})</option>`).join('')}
                    </select>
                    <button onclick="addPart()" class="bg-blue-600 px-4 rounded-xl font-bold">+</button>
                </div>
                <div id="f-keranjang" class="mt-3 space-y-1"></div>
            </div>
            <input id="f-byr" type="number" placeholder="Nominal Bayar (Rp)">
            <select id="f-met"><option value="Tunai">Tunai (Laci)</option><option value="Transfer">Transfer</option></select>
        `;
        m.classList.remove('hidden');
        document.getElementById('m-btn-save').onclick = async () => {
            const totPart = KERANJANG.reduce((a, b) => a + b.harga, 0);
            const { data: sNew } = await supabase.from('servis').insert([{
                kendaraan_id: uid,
                keluhan: document.getElementById('f-kel').value,
                jasa_service: document.getElementById('f-jas').value || 0,
                biaya_sparepart: totPart,
                uang_muka: document.getElementById('f-byr').value || 0,
                metode_bayar: document.getElementById('f-met').value
            }]).select().single();

            for(let item of KERANJANG) {
                await supabase.from('detail_servis').insert([{ servis_id: sNew.id, stok_id: item.id, jumlah: 1, harga_satuan: item.harga }]);
                const current = M_STOK.find(st => st.id === item.id);
                await supabase.from('stok_sparepart').update({ jumlah_stok: current.jumlah_stok - 1 }).eq('id', item.id);
            }
            closeModal(); fetchAll();
        };
    };

    window.addPart = () => {
        const sel = document.getElementById('f-part-sel');
        const opt = sel.selectedOptions[0];
        if(!opt.value) return;
        KERANJANG.push({ id: opt.value, nama: opt.text.split(' (')[0], harga: Number(opt.dataset.harga) });
        document.getElementById('f-keranjang').innerHTML = KERANJANG.map(x => `<div class="flex justify-between text-[10px] bg-white/5 p-2 rounded"><span>${x.nama}</span><b>Rp ${x.harga.toLocaleString()}</b></div>`).join('');
    };

    window.cetakNota = async (sid) => {
        const s = M_SERVIS.find(x => x.id === sid);
        const { data: det } = await supabase.from('detail_servis').select('*, stok_sparepart(nama_barang)').eq('servis_id', sid);
        const total = s.jasa_service + s.biaya_sparepart;
        const html = `
            <center><h2>JE GARAGE PRO</h2><p>Nota Bengkel</p></center>
            <hr>
            <table width="100%">
                <tr><td>Plat</td><td>: ${s.kendaraan.plat}</td></tr>
                <tr><td>Nama</td><td>: ${s.kendaraan.pelanggan.nama}</td></tr>
            </table>
            <hr>
            <table width="100%">
                ${det.map(i => `<tr><td>${i.stok_sparepart.nama_barang}</td><td align="right">Rp ${i.harga_satuan.toLocaleString()}</td></tr>`).join('')}
                <tr><td>Jasa Service</td><td align="right">Rp ${s.jasa_service.toLocaleString()}</td></tr>
            </table>
            <hr>
            <div style="text-align:right">
                <b>TOTAL: Rp ${total.toLocaleString()}</b><br>
                BAYAR: Rp ${s.uang_muka.toLocaleString()}<br>
                SISA: Rp ${(total - s.uang_muka).toLocaleString()}
            </div>
            <center><p style="font-size:10px; margin-top:20px">Terima Kasih</p></center>
        `;
        document.getElementById('print-area').innerHTML = html;
        window.print();
    };

    // --- OTHER MODALS ---
    window.openModal = async (type) => {
        const m = document.getElementById('modal');
        document.getElementById('m-title').innerText = "TAMBAH " + type;
        const body = document.getElementById('m-body');
        m.classList.remove('hidden');

        if(type === 'Pelanggan') {
            body.innerHTML = `<input id="v1" placeholder="Nama Lengkap">`;
            document.getElementById('m-btn-save').onclick = async () => { await supabase.from('pelanggan').insert([{ nama: document.getElementById('v1').value }]); closeModal(); fetchAll(); };
        } else if(type === 'Unit') {
            const { data: plist } = await supabase.from('pelanggan').select('*').order('nama');
            body.innerHTML = `<select id="v1">${plist.map(p => `<option value="${p.id}">${p.nama}</option>`).join('')}</select><input id="v2" placeholder="Plat Nomor" class="uppercase">`;
            document.getElementById('m-btn-save').onclick = async () => { await supabase.from('kendaraan').insert([{ pelanggan_id: document.getElementById('v1').value, plat: document.getElementById('v2').value.toUpperCase() }]); closeModal(); fetchAll(); };
        } else if(type === 'Stok') {
            body.innerHTML = `<input id="v1" placeholder="Nama Barang"><input id="v2" type="number" placeholder="Harga Jual"><input id="v3" type="number" placeholder="Jumlah Stok">`;
            document.getElementById('m-btn-save').onclick = async () => { await supabase.from('stok_sparepart').insert([{ nama_barang: document.getElementById('v1').value, harga_jual_satuan: document.getElementById('v2').value, jumlah_stok: document.getElementById('v3').value }]); closeModal(); fetchAll(); };
        } else if(type === 'Biaya') {
            body.innerHTML = `<input id="v1" placeholder="Keterangan Biaya"><input id="v2" type="number" placeholder="Nominal (Rp)">`;
            document.getElementById('m-btn-save').onclick = async () => { await supabase.from('pengeluaran').insert([{ keterangan: document.getElementById('v1').value, nominal: document.getElementById('v2').value }]); closeModal(); fetchAll(); };
        }
    };

    window.prosesLunas = async (id, sisa) => {
        const nominal = prompt("Masukkan Nominal Pelunasan:", sisa);
        if(nominal) {
            const current = M_SERVIS.find(x => x.id === id);
            await supabase.from('servis').update({ uang_muka: Number(current.uang_muka) + Number(nominal) }).eq('id', id);
            fetchAll();
        }
    };

    // --- UI TOOLS ---
    window.switchTab = (t) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.getElementById('sec-' + t).classList.remove('hidden');
        document.getElementById('t-' + t).classList.add('active');
    };
    window.closeModal = () => document.getElementById('modal').classList.add('hidden');
    window.hapusData = async (tab, id) => { if(confirm("Hapus?")) { await supabase.from(tab).delete().eq('id', id); fetchAll(); } };

    // Init App
    fetchAll();
</script>
</body>
</html>
