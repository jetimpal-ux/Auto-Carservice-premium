<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garage Pro v6.9.3 - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('https://i.postimg.cc/vBLZV5D2/IMG-20250602-063842.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; margin: 0; -webkit-tap-highlight-color: transparent; 
        }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 11px; }
        input, select { background: rgba(30, 30, 30, 0.9) !important; color: white !important; border: 1px solid #444 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        #login-screen { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

<div id="login-screen">
    <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg">
        <i class="fa-solid fa-car text-white text-2xl"></i>
    </div>
    <h2 class="text-xl font-black text-orange-500 uppercase italic mb-8">Garage Pro Login</h2>
    <div class="w-full max-w-xs space-y-4">
        <input type="password" id="pass-input" placeholder="••••" class="text-center font-bold">
        <button id="btn-login-action" class="orange-gradient w-full py-4 rounded-xl font-black text-xs uppercase">Masuk</button>
    </div>
</div>

<div id="dashboard-content" class="hidden max-w-4xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-car text-white text-2xl"></i></div>
            <div>
                <h1 class="text-xl font-black italic text-orange-500 uppercase tracking-tighter leading-none">Garage Pro</h1>
                <p class="text-[8px] text-zinc-400 font-bold uppercase mt-1">v6.9.3 • Bitung</p>
            </div>
        </div>
        <button onclick="window.loadAll()" class="w-10 h-10 rounded-xl bg-zinc-900/50 border border-zinc-800 text-orange-500"><i class="fa-solid fa-rotate"></i></button>
    </header>

    <nav class="flex gap-6 border-b border-white/5 mb-8">
        <div id="btn-tab-database" onclick="window.switchTab('tab-database')" class="tab active">Database</div>
        <div id="btn-tab-servis" onclick="window.switchTab('tab-servis')" class="tab">Workshop</div>
        <div id="btn-tab-finance" onclick="window.switchTab('tab-finance')" class="tab">Laporan</div>
    </nav>

    <div id="tab-database" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('pelanggan')" class="orange-gradient w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase">+ Pelanggan Baru</button>
                <div id="list-pelanggan" class="space-y-2"></div>
            </div>
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('kendaraan')" class="bg-zinc-800/40 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase border border-white/5">+ Unit Baru</button>
                <div id="list-kendaraan" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="tab-servis" class="tab-content hidden"><div id="list-pro-workshop" class="space-y-4"></div></div>
    <div id="tab-finance" class="tab-content hidden"><div id="finance-stats" class="grid grid-cols-2 gap-3 mb-6"></div><div id="table-finance-body" class="space-y-4 card-dark p-4 rounded-2xl"></div></div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-md">
    <div class="card-dark w-full max-w-lg p-6 rounded-[2.5rem]">
        <h3 id="modal-title" class="text-xl font-bold text-orange-500 mb-6 uppercase italic">Modal</h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex flex-col gap-2 mt-8">
            <button id="btn-execute" class="orange-gradient py-4 rounded-xl font-black text-[10px] uppercase">Simpan Data</button>
            <button onclick="window.closeModal()" class="bg-zinc-900 py-4 rounded-xl font-bold text-[10px] text-zinc-500 uppercase">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    
    // SESUAIKAN DENGAN URL & KEY ANDA
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    };

    window.closeModal = () => { document.getElementById('modal-container').classList.add('hidden'); };

    window.loadAll = async () => {
        const { data: p } = await supabase.from('pelanggan').select('*').order('nama');
        const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending:false});
        
        document.getElementById('list-pelanggan').innerHTML = (p || []).map(i => `<div class="bg-white/5 p-3 rounded-xl border border-white/5 text-sm">${i.nama}</div>`).join('');
        document.getElementById('list-kendaraan').innerHTML = (k || []).map(i => `<div class="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5"><div class="text-xs font-bold text-orange-500">${i.plat} <span class="text-zinc-500 font-normal">(${i.pelanggan?.nama || '-'})</span></div></div>`).join('');
    };

    // FUNGSI KRUSIAL: OPEN MODAL DENGAN FORCE-FETCH
    window.openModal = async (type) => {
        const body = document.getElementById('modal-body'), title = document.getElementById('modal-title'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        body.innerHTML = `<p class="text-center text-orange-500 animate-bounce py-4 text-[10px] font-bold">MENGAMBIL DATA PELANGGAN...</p>`;

        if(type === 'pelanggan') {
            title.innerText = "Tambah Pelanggan";
            body.innerHTML = `<input id="inp-nama" placeholder="Nama Lengkap">`;
            btn.onclick = async () => {
                const n = document.getElementById('inp-nama').value;
                if(!n) return alert("Isi Nama!");
                await supabase.from('pelanggan').insert([{ nama: n }]);
                window.closeModal(); window.loadAll();
            };
        } else if(type === 'kendaraan') {
            title.innerText = "Tambah Unit";
            
            // AMBIL DATA TERBARU DARI DATABASE
            const { data: listP, error } = await supabase.from('pelanggan').select('*').order('nama');
            
            if(error || !listP || listP.length === 0) {
                body.innerHTML = `<p class="text-red-500 text-center text-xs">Gagal memuat pelanggan. Pastikan data pelanggan sudah ada!</p>`;
                return;
            }

            body.innerHTML = `
                <select id="sel-pel">
                    ${listP.map(x => `<option value="${x.id}">${x.nama.toUpperCase()}</option>`).join('')}
                </select>
                <input id="inp-merek" placeholder="Merek Mobil" class="mt-3">
                <input id="inp-plat" placeholder="Plat Nomor" class="mt-3 uppercase">
            `;

            btn.onclick = async () => {
                const pelId = document.getElementById('sel-pel').value;
                const plat = document.getElementById('inp-plat').value;
                if(!pelId || !plat) return alert("Pilih Pelanggan & Isi Plat!");
                await supabase.from('kendaraan').insert([{ pelanggan_id: pelId, merek: document.getElementById('inp-merek').value, plat: plat.toUpperCase() }]);
                window.closeModal(); window.loadAll();
            };
        }
    };

    document.getElementById('btn-login-action').onclick = () => {
        if(document.getElementById('pass-input').value === "123") {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            window.loadAll();
        }
    };
</script>
</body>
</html>
