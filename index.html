<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Je Garage Pro v10 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; margin: 0; }
        body::before { content: ""; position: fixed; inset: 0; background: url('https://i.postimg.cc/xCDV3vRZ/car-automobile-repair-shop-engine-motor-vehicle-service-maintenance-auto-parts-6c3120919a9a891118831.png') center/cover; opacity: 0.1; z-index: -1; }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 10px; flex: 1; text-align: center; }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        input, select { background: #1a1a1a !important; color: white !important; border: 1px solid #333 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; font-size: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #print-area { display: none; }
        @media print { body * { visibility: hidden; } #print-area { display: block !important; visibility: visible !important; position: absolute; left: 0; top: 0; width: 100%; color: #000; background: #fff; } }
    </style>
</head>
<body class="pb-24">

<div id="app" class="max-w-lg mx-auto p-4">
    <header class="flex justify-between items-center mb-6 bg-zinc-900/50 p-4 rounded-2xl border border-white/5 sticky top-2 z-[50] backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-900/40"><i class="fa-solid fa-car-side text-white text-xl"></i></div>
            <div><h1 class="text-lg font-black italic uppercase leading-none">Je Garage <span class="text-orange-500">Pro</span></h1><p class="text-[7px] text-zinc-500 font-bold mt-1">V10.0 FINAL VERIFIED</p></div>
        </div>
        <button onclick="window.loadAll()" class="w-10 h-10 rounded-xl bg-zinc-800 text-orange-500 border border-zinc-700 active:rotate-180 transition-all duration-500"><i class="fa-solid fa-sync"></i></button>
    </header>

    <nav class="flex border-b border-zinc-900 mb-6 sticky top-[88px] z-[40] bg-black/80 backdrop-blur-sm">
        <div id="btn-tab-database" onclick="window.switchTab('tab-database')" class="tab active">Database</div>
        <div id="btn-tab-servis" onclick="window.switchTab('tab-servis')" class="tab">Workshop</div>
        <div id="btn-tab-stok" onclick="window.switchTab('tab-stok')" class="tab">Gudang</div>
        <div id="btn-tab-finance" onclick="window.switchTab('tab-finance')" class="tab">Laporan</div>
    </nav>

    <div id="tab-database" class="tab-content space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <button onclick="window.openModal('pelanggan')" class="orange-gradient py-4 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-orange-900/20">+ Pelanggan</button>
            <button onclick="window.openModal('kendaraan')" class="bg-zinc-800 py-4 rounded-xl font-black text-[10px] uppercase border border-zinc-700 shadow-xl">+ Unit Baru</button>
        </div>
        <div id="list-kendaraan" class="space-y-3 pt-2"></div>
    </div>

    <div id="tab-servis" class="tab-content hidden space-y-4">
        <div class="relative">
            <i class="fa-solid fa-search absolute left-4 top-4 text-zinc-600 text-xs"></i>
            <input type="text" id="search-ws" placeholder="Cari Plat Nomor..." oninput="window.renderWorkshop()" class="pl-10 italic">
        </div>
        <div id="list-pro-workshop" class="space-y-4"></div>
    </div>

    <div id="tab-stok" class="tab-content hidden space-y-4">
        <button onclick="window.openModal('stok')" class="bg-blue-600/20 text-blue-400 border border-blue-500/30 w-full py-4 rounded-xl font-black text-[10px] uppercase italic shadow-xl">+ Update Stok Gudang</button>
        <div id="list-gudang" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="tab-finance" class="tab-content hidden space-y-4">
        <div id="jurnal-summary-area"></div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="window.openModal('tambah_modal')" class="bg-emerald-600/10 text-emerald-500 border border-emerald-500/20 py-4 rounded-xl text-[10px] font-black uppercase italic shadow-lg">Input Modal</button>
            <button onclick="window.openModal('pengeluaran')" class="bg-red-600/10 text-red-500 border border-red-500/20 py-4 rounded-xl text-[10px] font-black uppercase italic shadow-lg">Input Biaya</button>
        </div>
        <div class="card-dark p-5">
            <h3 class="text-[9px] font-black text-zinc-500 uppercase mb-4 italic tracking-widest">Alur Kas Hari Ini</h3>
            <div id="jurnal-flow-body" class="space-y-3 text-[11px]"></div>
        </div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-[100] backdrop-blur-xl">
    <div class="card-dark w-full max-w-sm p-6 border border-white/10 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 id="modal-title" class="text-orange-500 font-black italic uppercase tracking-tighter">Input</h3>
            <button onclick="window.closeModal()" class="text-zinc-500"><i class="fa-solid fa-times"></i></button>
        </div>
        <div id="modal-body" class="space-y-4"></div>
        <div class="mt-8 space-y-2">
            <button id="btn-execute" class="orange-gradient w-full py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-orange-900/30">Simpan Data</button>
            <button onclick="window.closeModal()" class="w-full py-2 text-zinc-600 font-bold text-[10px] uppercase text-center">Batal</button>
        </div>
    </div>
</div>

<div id="print-area"></div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co", SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZgnobjaqxojggjonhiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);
    let masterS = [], masterE = [], masterSt = [], keranjang = [];

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    };

    window.loadAll = async () => {
        const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('plat');
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
        const { data: ex } = await supabase.from('pengeluaran').select('*').order('created_at', {ascending: false});
        const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');
        
        masterS = s || []; masterE = ex || []; masterSt = st || [];
        
        // Render Database Unit
        document.getElementById('list-kendaraan').innerHTML = k.map(i => `
            <div class="card-dark p-4 flex justify-between items-center transition-all active:scale-95">
                <div><p class="text-orange-500 font-black italic uppercase text-sm tracking-tighter">${i.plat}</p><p class="text-[9px] text-zinc-500 font-bold uppercase">${i.pelanggan?.nama || '-'}</p></div>
                <button onclick="window.openModal('servis', '${i.id}')" class="bg-orange-500/10 text-orange-500 px-5 py-3 rounded-xl text-[9px] font-black uppercase italic border border-orange-500/20 shadow-lg shadow-orange-900/10">Servis</button>
            </div>`).join('');

        // Render Gudang
        document.getElementById('list-gudang').innerHTML = masterSt.map(i => `
            <div class="card-dark p-4 border-b-2 ${i.jumlah_stok < 5 ? 'border-red-600/50 bg-red-950/5' : 'border-emerald-600/50 bg-emerald-950/5'}">
                <p class="text-[8px] opacity-40 uppercase font-black tracking-widest">${i.nama_barang}</p>
                <div class="flex justify-between items-end mt-1">
                    <p class="text-lg font-black">${i.jumlah_stok}<span class="text-[10px] text-zinc-600 ml-1 uppercase">Pcs</span></p>
                    <p class="text-[9px] text-orange-500 font-bold">@ ${i.harga_jual_satuan.toLocaleString()}</p>
                </div>
            </div>`).join('');

        window.renderWorkshop(); window.updateFinanceUI();
    };

    window.renderWorkshop = () => {
        const q = document.getElementById('search-ws').value.toUpperCase();
        const f = masterS.filter(x => x.kendaraan?.plat?.toUpperCase().includes(q) || x.kendaraan?.pelanggan?.nama?.toUpperCase().includes(q));
        document.getElementById('list-pro-workshop').innerHTML = f.map(x => {
            const tot = (x.jasa_service || 0) + (x.biaya_sparepart || 0), sisa = tot - (x.uang_muka || 0);
            return `<div class="card-dark p-5 border-l-4 ${sisa > 0 ? 'border-red-600 shadow-red-900/10' : 'border-emerald-600 shadow-emerald-900/10'} shadow-xl">
                <div class="flex justify-between items-start">
                    <div><h3 class="text-lg font-black text-orange-500 italic tracking-tighter">${x.kendaraan?.plat}</h3><p class="text-[9px] text-zinc-500 font-bold uppercase">${x.kendaraan?.pelanggan?.nama}</p></div>
                    <button onclick="window.printNota('${x.id}')" class="text-zinc-600 bg-white/5 w-10 h-10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-print"></i></button>
                </div>
                <p class="text-[10px] text-zinc-400 mt-3 italic leading-relaxed line-clamp-2">${x.keluhan}</p>
                <div class="mt-4 flex justify-between items-center pt-4 border-t border-white/5">
                    ${sisa > 0 ? `<button onclick="window.bayarSisaModal('${x.id}', ${sisa})" class="bg-red-600 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase shadow-lg shadow-red-900/40 animate-pulse">LUNASI Rp ${sisa.toLocaleString()}</button>` : '<span class="text-emerald-500 text-[10px] font-black italic tracking-widest"><i class="fa-solid fa-check-circle mr-1"></i>LUNAS</span>'}
                    <div class="text-right"><p class="text-[8px] text-zinc-600 font-bold uppercase">Total Biaya</p><p class="font-black text-sm text-zinc-200 tracking-tighter">Rp ${tot.toLocaleString()}</p></div>
                </div></div>`;
        }).join('');
    };

    window.bayarSisaModal = async (id, sisa) => {
        const v = prompt("Masukkan Nominal Pelunasan (Maks Rp "+sisa.toLocaleString()+"):");
        if(v && !isNaN(v)) {
            const {data:c} = await supabase.from('servis').select('uang_muka').eq('id',id).single();
            await supabase.from('servis').update({uang_muka: parseInt(c.uang_muka)+parseInt(v)}).eq('id',id);
            window.loadAll();
        }
    };

    window.updateFinanceUI = () => {
        const now = new Date(), todayStr = now.toDateString();
        let tMasuk = 0, tKeluar = 0, sAwal = 0, piutang = 0;

        masterS.forEach(x => {
            const tot = (x.jasa_service||0) + (x.biaya_sparepart||0);
            const sisa = tot - (x.uang_muka||0);
            if(new Date(x.created_at).toDateString() === todayStr) {
                tMasuk += (x.uang_muka || 0);
                piutang += sisa;
            } else {
                sAwal += (x.uang_muka || 0);
            }
        });

        masterE.forEach(x => {
            const d = new Date(x.created_at);
            if(d.toDateString() === todayStr) {
                if(x.nominal < 0) tMasuk += Math.abs(x.nominal); // Modal dianggap uang masuk ke kas
                else tKeluar += x.nominal;
            } else {
                if(x.nominal < 0) sAwal += Math.abs(x.nominal);
                else sAwal -= x.nominal;
            }
        });

        document.getElementById('jurnal-summary-area').innerHTML = `
            <div class="card-dark p-6 border-l-4 border-emerald-500 bg-emerald-950/10 shadow-xl mb-4">
                <p class="text-[8px] text-zinc-500 font-black uppercase mb-1 tracking-widest">Total Saldo Kas Tersedia</p>
                <h2 class="text-3xl font-black text-emerald-500 tracking-tighter glow-text">Rp ${(sAwal + tMasuk - tKeluar).toLocaleString()}</h2>
                <div class="grid grid-cols-2 mt-6 pt-4 border-t border-white/5 gap-4">
                    <div><p class="text-[7px] text-zinc-500 uppercase font-black">Saldo Awal (Kemarin)</p><p class="text-xs font-black text-zinc-300 italic">Rp ${sAwal.toLocaleString()}</p></div>
                    <div><p class="text-[7px] text-red-500 uppercase font-black">Total Piutang Bengkel</p><p class="text-xs font-black text-red-500 italic">Rp ${piutang.toLocaleString()}</p></div>
                </div>
            </div>`;

        let flow = `<div class="flex justify-between text-zinc-600 italic pb-2 text-[10px] border-b border-white/5"><span>[Auto] Saldo Awal Hari Ini</span><span class="font-bold">Rp ${sAwal.toLocaleString()}</span></div>`;
        
        const todayS = masterS.filter(x => new Date(x.created_at).toDateString() === todayStr);
        const todayE = masterE.filter(x => new Date(x.created_at).toDateString() === todayStr);

        todayS.forEach(x => {
            flow += `<div class="flex justify-between items-center py-2 border-b border-white/5"><div class="flex flex-col"><span class="font-black text-zinc-200 text-[10px] uppercase">${x.kendaraan?.plat}</span><span class="text-[7px] text-zinc-600 uppercase font-bold">${x.metode_bayar || 'Tunai'}</span></div><span class="font-black text-emerald-500">+Rp ${x.uang_muka.toLocaleString()}</span></div>`;
        });
        todayE.forEach(x => {
            const isModal = x.nominal < 0;
            flow += `<div class="flex justify-between items-center py-2 border-b border-white/5"><span class="font-bold text-[10px] uppercase ${isModal?'text-emerald-400':'text-zinc-400'}">${x.keterangan}</span><span class="font-black ${isModal?'text-emerald-500':'text-red-500'}">${isModal?'+':'-'}Rp ${Math.abs(x.nominal).toLocaleString()}</span></div>`;
        });
        document.getElementById('jurnal-flow-body').innerHTML = flow || '<p class="text-center text-zinc-700 py-4 font-bold uppercase text-[9px]">Belum Ada Pergerakan Kas</p>';
    };

    window.openModal = async (type, id = null) => {
        const b = document.getElementById('modal-body'), t = document.getElementById('modal-title'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        keranjang = [];
        
        if(type==='servis'){
            t.innerText="Workshop Log";
            b.innerHTML = `
                <input id="s-kel" placeholder="Tulis Pekerjaan / Keluhan...">
                <input id="s-jasa" type="number" placeholder="Biaya Jasa Service (Rp)" oninput="window.calcCart()">
                <div class="p-4 bg-black/50 rounded-2xl border border-white/5 space-y-3">
                    <p class="text-[9px] font-black text-orange-500 uppercase italic">Input Sparepart / Part Luar</p>
                    <input id="p-nama" placeholder="Nama Part" class="!bg-zinc-800">
                    <input id="p-harga" type="number" placeholder="Harga Jual" class="!bg-zinc-800">
                    <button onclick="window.addToCart()" class="orange-gradient w-full py-3 rounded-xl font-black text-[9px] uppercase shadow-lg">Tambah Ke Nota</button>
                    <div id="cart-display" class="text-[9px] text-orange-400 font-bold space-y-1 mt-2"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select id="s-met"><option>Tunai</option><option>Transfer</option></select>
                    <input id="s-bayar" type="number" placeholder="Dibayar Rp" oninput="window.calcCart()">
                </div>
                <div class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center border border-white/5">
                    <span class="text-[9px] font-black text-zinc-500 uppercase tracking-widest">Sisa Tagihan</span>
                    <span id="v-sisa" class="font-black text-red-500 text-sm">Rp 0</span>
                </div>`;
            
            window.addToCart = () => {
                const n = document.getElementById('p-nama').value, h = parseInt(document.getElementById('p-harga').value || 0);
                if(n && h > 0) { keranjang.push({n, h}); document.getElementById('p-nama').value=''; document.getElementById('p-harga').value=''; renderCart(); window.calcCart(); }
            };
            const renderCart = () => document.getElementById('cart-display').innerHTML = keranjang.map((c, idx) => `<div class="flex justify-between"><span>• ${c.n}</span><span>Rp ${c.h.toLocaleString()}</span></div>`).join('');
            window.calcCart = () => {
                const tot = parseInt(document.getElementById('s-jasa').value||0) + keranjang.reduce((a,b)=>a+b.h, 0);
                const sisa = tot - parseInt(document.getElementById('s-bayar').value||0);
                document.getElementById('v-sisa').innerText = "Rp " + sisa.toLocaleString();
            };
            btn.onclick = async () => {
                const {error} = await supabase.from('servis').insert([{
                    kendaraan_id: id, keluhan: document.getElementById('s-kel').value,
                    jasa_service: document.getElementById('s-jasa').value||0,
                    biaya_sparepart: keranjang.reduce((a,b)=>a+b.h,0),
                    uang_muka: document.getElementById('s-bayar').value||0,
                    metode_bayar: document.getElementById('s-met').value
                }]);
                if(!error) { window.closeModal(); window.loadAll(); }
            };
        } else if(type==='stok'){
            t.innerText="Inventory Update";
            b.innerHTML = `<input id="st-n" placeholder="Nama Sparepart"><input id="st-h" type="number" placeholder="Harga Jual Satuan"><input id="st-s" type="number" placeholder="Jumlah Stok Awal">`;
            btn.onclick = async () => {
                await supabase.from('stok_sparepart').insert([{nama_barang:document.getElementById('st-n').value, harga_jual_satuan:document.getElementById('st-h').value, jumlah_stok:document.getElementById('st-s').value, satuan:'Pcs'}]);
                window.closeModal(); window.loadAll();
            };
        } else if(type==='pelanggan'){
            t.innerText="Customer Data"; b.innerHTML=`<input id="p-n" placeholder="Nama Pelanggan / Bengkel">`; btn.onclick=async()=>{ await supabase.from('pelanggan').insert([{nama:document.getElementById('p-n').value}]); window.closeModal(); window.loadAll();};
        } else if(type==='kendaraan'){
            const {data:pl} = await supabase.from('pelanggan').select('*');
            t.innerText="Unit Data"; b.innerHTML=`<select id="u-p"><option disabled selected>Pilih Pemilik</option>${pl.map(x=>`<option value="${x.id}">${x.nama}</option>`).join('')}</select><input id="u-plat" class="uppercase" placeholder="Plat Nomor (DB XXXX XX)">`;
            btn.onclick=async()=>{ await supabase.from('kendaraan').insert([{pelanggan_id:document.getElementById('u-p').value, plat:document.getElementById('u-plat').value.toUpperCase()}]); window.closeModal(); window.loadAll();};
        } else if(type==='tambah_modal' || type==='pengeluaran'){
            t.innerText=type==='tambah_modal'?"Cash Injection":"Expense Record"; 
            b.innerHTML=`<input id="e-k" placeholder="Keterangan Transaksi"><input id="e-n" type="number" placeholder="Nominal Rp">`;
            btn.onclick=async()=>{ await supabase.from('pengeluaran').insert([{keterangan:(type==='tambah_modal'?'[MODAL] ':'')+document.getElementById('e-k').value, nominal:type==='tambah_modal'?-Math.abs(document.getElementById('e-n').value):Math.abs(document.getElementById('e-n').value)}]); window.closeModal(); window.loadAll();};
        }
    };

    window.printNota = async (id) => {
        const {data:x} = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').eq('id',id).single();
        const tot = (x.jasa_service||0) + (x.biaya_sparepart||0);
        document.getElementById('print-area').innerHTML = `
            <div style="font-family:monospace; color:black; padding:20px; border:1px solid #000; width:300px; background:white;">
                <center><b>JE GARAGE</b><br><small>Service & Sparepart</small></center><hr>
                Unit: ${x.kendaraan.plat}<br>Pemilik: ${x.kendaraan.pelanggan.nama}<hr>
                Kerja: ${x.keluhan}<br><br>
                Jasa: Rp ${x.jasa_service.toLocaleString()}<br>Part: Rp ${x.biaya_sparepart.toLocaleString()}<hr>
                <b>TOTAL: Rp ${tot.toLocaleString()}</b><br>
                Bayar: Rp ${x.uang_muka.toLocaleString()}<br><b>SISA: Rp ${(tot-x.uang_muka).toLocaleString()}</b><hr>
                <center>Terima Kasih</center>
            </div>`;
        window.print();
    };

    window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');
    window.loadAll();
</script>
</body>
</html>
