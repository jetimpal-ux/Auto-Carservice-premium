<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garage Pro v6.5 - Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; margin: 0; -webkit-tap-highlight-color: transparent; }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: #111; border: 1px solid #222; }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
        input, select { background: #1a1a1a !important; color: white !important; border: 1px solid #333 !important; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        
        #login-screen { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }

        @media print { 
            body > *:not(#print-area) { display: none !important; } 
            #print-area { display: block !important; color: black; background: white; padding: 20px; width: 100%; } 
            table { width: 100%; border-collapse: collapse; margin-top: 15px; } 
            th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 10px; color: black; } 
        }
    </style>
</head>
<body class="pb-24">

<div id="login-screen">
    <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-orange-500/20">
        <i class="fa-solid fa-lock text-white text-2xl"></i>
    </div>
    <h2 class="text-xl font-black text-orange-500 uppercase italic mb-8">Garage Pro Login</h2>
    <div class="w-full max-w-xs space-y-4">
        <input type="text" id="pass-input" placeholder="Masukkan Password" class="text-center font-bold tracking-widest">
        <button id="btn-login-action" class="orange-gradient w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest">Masuk</button>
        <p id="login-msg" class="text-[10px] text-red-500 text-center font-bold uppercase hidden italic">Password Salah!</p>
    </div>
</div>

<div id="print-area" class="hidden"></div>

<div id="dashboard-content" class="hidden max-w-4xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-gear text-white text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black italic text-orange-500 uppercase tracking-tighter leading-none">Garage Pro</h1>
                <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest mt-1">v6.5 Final Stable</p>
            </div>
        </div>
        <button onclick="window.loadAll()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-orange-500 flex items-center justify-center"><i class="fa-solid fa-sync"></i></button>
    </header>

    <nav class="flex gap-6 border-b border-zinc-900 mb-8 overflow-x-auto no-scrollbar">
        <div id="btn-tab-database" onclick="window.switchTab('tab-database')" class="tab active">Database</div>
        <div id="btn-tab-servis" onclick="window.switchTab('tab-servis')" class="tab">Workshop</div>
        <div id="btn-tab-stok" onclick="window.switchTab('tab-stok')" class="tab">Gudang</div>
        <div id="btn-tab-finance" onclick="window.switchTab('tab-finance')" class="tab">Laporan</div>
    </nav>

    <div id="tab-database" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('pelanggan')" class="orange-gradient w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase shadow-lg shadow-orange-900/40">+ Pelanggan Baru</button>
                <div id="list-pelanggan" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
            </div>
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('kendaraan')" class="bg-zinc-800 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase border border-zinc-700">+ Unit Baru</button>
                <div id="list-kendaraan" class="space-y-3 mt-4 max-h-[400px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <div id="tab-servis" class="tab-content hidden"><div id="list-pro-workshop" class="space-y-4"></div></div>
    
    <div id="tab-stok" class="tab-content hidden">
        <button onclick="window.openModal('stok')" class="bg-blue-600 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase tracking-widest">+ Stok Gudang</button>
        <div class="grid grid-cols-2 gap-4" id="list-stok"></div>
    </div>

    <div id="tab-finance" class="tab-content hidden">
        <div class="flex gap-3 mb-6">
            <select id="filter-finance" onchange="window.loadAll()" class="text-xs flex-1">
                <option value="hari">Hari Ini</option>
                <option value="bulan">Bulan Ini</option>
                <option value="semua">Semua Waktu</option>
            </select>
            <button onclick="window.printReport()" class="bg-zinc-800 px-4 rounded-xl text-[10px] font-bold uppercase border border-zinc-700"><i class="fa-solid fa-print mr-2"></i> Cetak Rekap</button>
        </div>
        <div id="finance-stats" class="grid grid-cols-2 gap-4 mb-6"></div>
        <div class="card-dark rounded-3xl p-5 overflow-hidden">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 tracking-widest">Riwayat Transaksi</h3>
            <div id="table-finance-body" class="space-y-4"></div>
        </div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-md">
    <div class="card-dark w-full max-w-lg p-6 rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 id="modal-title" class="text-xl font-bold text-orange-500 mb-6 italic uppercase tracking-tighter">Modal</h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex flex-col gap-2 mt-8">
            <button id="btn-execute" class="orange-gradient py-4 rounded-xl font-black text-xs uppercase tracking-widest">Simpan</button>
            <button onclick="window.closeModal()" class="bg-zinc-900 py-4 rounded-xl font-bold text-xs text-zinc-500 uppercase tracking-widest">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    
    // GANTI DATA SUPABASE ANDA DISINI
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);

    const MASTER_PASS = "123"; 
    let keranjang = [];

    // FUNGSI LOGIN
    const eksekusiLogin = () => {
        const input = document.getElementById('pass-input').value.trim();
        const screen = document.getElementById('login-screen');
        const dash = document.getElementById('dashboard-content');
        const msg = document.getElementById('login-msg');

        if(input === MASTER_PASS) {
            screen.classList.add('hidden');
            dash.classList.remove('hidden');
            window.loadAll();
        } else {
            msg.classList.remove('hidden');
            document.getElementById('pass-input').value = "";
        }
    };

    // Tombol Login & Enter Keyboard
    document.getElementById('btn-login-action').onclick = eksekusiLogin;
    document.getElementById('pass-input').onkeydown = (e) => { if(e.key === 'Enter') eksekusiLogin(); };

    // FUNGSI GLOBAL (WINDOW)
    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    };

    window.closeModal = () => { document.getElementById('modal-container').classList.add('hidden'); keranjang = []; };

    window.loadAll = async () => {
        try {
            const { data: p } = await supabase.from('pelanggan').select('*').order('created_at', {ascending: false});
            const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending: false});
            const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
            const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');

            document.getElementById('list-pelanggan').innerHTML = (p || []).map(i => `<div class="bg-zinc-900 p-4 rounded-2xl border border-white/5"><p class="font-bold text-sm">${i.nama}</p></div>`).join('');
            document.getElementById('list-kendaraan').innerHTML = (k || []).map(i => `<div class="bg-zinc-900/40 p-4 rounded-xl flex justify-between items-center border border-zinc-900 mb-2"><div class="text-xs font-bold text-orange-500">${i.plat}<p class="text-[9px] text-zinc-600 uppercase">${i.pelanggan?.nama || '-'}</p></div><button onclick="window.openModal('servis', '${i.id}')" class="bg-orange-600/10 text-orange-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Servis</button></div>`).join('');

            document.getElementById('list-pro-workshop').innerHTML = (s || []).slice(0, 20).map(x => {
                const tot = parseInt(x.jasa_service || 0) + parseInt(x.biaya_sparepart || 0);
                const sisa = tot - parseInt(x.uang_muka || 0);
                return `<div class="card-dark p-6 rounded-[2rem] border-l-4 ${sisa > 0 ? 'border-red-600' : 'border-emerald-600'}">
                    <div class="flex justify-between items-start">
                        <div><h3 class="text-xl font-black text-orange-500 italic">${x.kendaraan?.plat}</h3><p class="text-[10px] text-zinc-600 uppercase">${x.kendaraan?.pelanggan?.nama || '-'}</p></div>
                        <button onclick="window.printNotaFull('${x.id}')" class="text-orange-500"><i class="fa-solid fa-print"></i></button>
                    </div>
                    <div class="mt-4 flex justify-between items-end pt-3 border-t border-white/5">
                        <div class="flex-1 mr-4"><p class="text-[10px] opacity-40 italic truncate">${x.keluhan}</p>${sisa > 0 ? `<button onclick="window.bayarSisaModal('${x.id}', ${sisa})" class="bg-red-600/20 text-red-500 px-3 py-1 rounded-lg text-[9px] font-black mt-2">LUNASI</button>` : '<span class="text-emerald-500 text-[10px] font-bold italic uppercase tracking-widest">LUNAS</span>'}</div>
                        <div class="text-right"><p class="font-black ${sisa > 0 ? 'text-red-500' : 'text-emerald-500'} text-sm italic">Rp ${sisa.toLocaleString()}</p></div>
                    </div></div>`;
            }).join('');

            document.getElementById('list-stok').innerHTML = (st || []).map(i => `<div class="card-dark p-4 rounded-3xl border-l-4 ${i.jumlah_stok < 5 ? 'border-red-600' : 'border-blue-500'}"><p class="text-[8px] text-zinc-500 uppercase font-bold">${i.nama_barang}</p><h4 class="text-lg font-black italic">${i.jumlah_stok} <span class="text-[9px] opacity-30">${i.satuan || 'Pcs'}</span></h4></div>`).join('');

            const filter = document.getElementById('filter-finance').value;
            const now = new Date();
            const filteredS = (s || []).filter(x => {
                const d = new Date(x.created_at);
                if(filter === 'hari') return d.toDateString() === now.toDateString();
                if(filter === 'bulan') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                return true;
            });

            let piutangGlobal = 0, masukFilter = 0;
            filteredS.forEach(x => masukFilter += parseInt(x.uang_muka || 0));
            (s || []).forEach(x => piutangGlobal += ((parseInt(x.jasa_service)+parseInt(x.biaya_sparepart)) - parseInt(x.uang_muka)));

            document.getElementById('finance-stats').innerHTML = `
                <div class="col-span-2 card-dark p-6 rounded-[2rem] border-l-4 border-red-600 bg-red-950/5">
                    <p class="text-[9px] text-zinc-400 font-bold uppercase mb-1">Piutang Keseluruhan</p>
                    <h2 class="text-3xl font-black text-red-500">Rp ${piutangGlobal.toLocaleString()}</h2>
                </div>
                <div class="col-span-2 card-dark p-5 rounded-3xl border-l-4 border-emerald-600">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Masuk (${filter})</p>
                    <h2 class="text-xl font-black text-emerald-500">Rp ${masukFilter.toLocaleString()}</h2>
                </div>`;

            document.getElementById('table-finance-body').innerHTML = filteredS.map(x => `<div class="flex justify-between items-center border-b border-zinc-900 pb-3"><div><p class="text-xs font-bold text-zinc-200">${x.kendaraan?.plat || '-'}</p><p class="text-[9px] text-zinc-600">${new Date(x.created_at).toLocaleDateString()}</p></div><p class="text-xs font-black text-emerald-500">Rp ${parseInt(x.uang_muka || 0).toLocaleString()}</p></div>`).join('');
        } catch (e) { console.error("Database Gagal:", e); }
    };

    window.openModal = async (type, id = null) => {
        const body = document.getElementById('modal-body'), title = document.getElementById('modal-title'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        if(type === 'pelanggan') {
            title.innerText = "Pelanggan Baru"; body.innerHTML = `<input id="inp-nama" placeholder="Nama Lengkap">`;
            btn.onclick = async () => { await supabase.from('pelanggan').insert([{ nama: document.getElementById('inp-nama').value }]); window.closeModal(); window.loadAll(); };
        } else if(type === 'kendaraan') {
            title.innerText = "Unit Baru";
            const { data: pList } = await supabase.from('pelanggan').select('*').order('created_at', {ascending: false});
            body.innerHTML = `<select id="sel-pel">${pList?.map(x => `<option value="${x.id}">${x.nama}</option>`).join('')}</select><input id="inp-plat" class="uppercase" placeholder="Plat Nomor">`;
            btn.onclick = async () => { await supabase.from('kendaraan').insert([{ pelanggan_id: document.getElementById('sel-pel').value, plat: document.getElementById('inp-plat').value.toUpperCase() }]); window.closeModal(); window.loadAll(); };
        } else if(type === 'servis') {
            title.innerText = "Workshop Input";
            body.innerHTML = `<input id="v-kel" placeholder="Pekerjaan"><input id="v-jasa" type="number" placeholder="Jasa (Rp)" oninput="window.calc()"><div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800"><p class="text-[9px] text-zinc-500 mb-2 uppercase font-bold tracking-widest">Sparepart</p><div id="spare-input-area"></div><div id="basket-list" class="mt-4 space-y-2"></div></div><select id="v-metode"><option value="Tunai">Tunai</option><option value="BON">BON</option></select><input id="v-bayar" type="number" placeholder="Bayar Tunai" oninput="window.calc()"><p id="v-sisa" class="text-xs text-red-500 font-bold uppercase">Sisa: Rp 0</p>`;
            window.updateSpareInput(false);
            btn.onclick = async () => {
                const totalPart = keranjang.reduce((acc, curr) => acc + (curr.harga * curr.qty), 0);
                const { data: n } = await supabase.from('servis').insert([{ kendaraan_id: id, keluhan: document.getElementById('v-kel').value, jasa_service: document.getElementById('v-jasa').value || 0, biaya_sparepart: totalPart, uang_muka: document.getElementById('v-bayar').value || 0, metode_bayar: document.getElementById('v-metode').value }]).select().single();
                for(let it of keranjang) {
                    await supabase.from('detail_servis').insert([{ servis_id: n.id, stok_id: it.stok_id, jumlah: it.qty, harga_satuan: it.harga }]);
                    if(it.stok_id) {
                        const { data: cur } = await supabase.from('stok_sparepart').select('jumlah_stok').eq('id', it.stok_id).single();
                        await supabase.from('stok_sparepart').update({ jumlah_stok: (cur?.jumlah_stok || 0) - it.qty }).eq('id', it.stok_id);
                    }
                }
                window.closeModal(); window.loadAll();
            };
        } else if(type === 'stok') {
            title.innerText = "Update Stok"; body.innerHTML = `<input id="s-nama" placeholder="Barang"><input id="s-satuan" placeholder="Satuan"><input id="s-harga" type="number" placeholder="Harga"><input id="s-jumlah" type="number" placeholder="Jumlah">`;
            btn.onclick = async () => { await supabase.from('stok_sparepart').insert([{ nama_barang: document.getElementById('s-nama').value, satuan: document.getElementById('s-satuan').value, harga_jual_satuan: document.getElementById('s-harga').value, jumlah_stok: document.getElementById('s-jumlah').value }]); window.closeModal(); window.loadAll(); };
        }
    };

    window.updateSpareInput = async (manual) => {
        const area = document.getElementById('spare-input-area');
        if(manual) {
            area.innerHTML = `<input id="m-nama" placeholder="Part Luar" class="mb-2"><div class="flex gap-2"><input id="m-harga" type="number" placeholder="Harga"><input id="m-qty" type="number" value="1" class="w-16"><button onclick="window.addManual()" class="bg-orange-600 px-4 rounded-xl font-bold">+</button></div><button onclick="window.updateSpareInput(false)" class="text-[9px] text-blue-400 mt-2 underline">Cek Gudang</button>`;
        } else {
            const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');
            area.innerHTML = `<div class="flex gap-2"><select id="v-spare" class="flex-1 text-[10px]"><option value="">-- Pilih --</option>${st?.map(x => `<option value="${x.id}" data-harga="${x.harga_jual_satuan}">${x.nama_barang} (${x.jumlah_stok})</option>`).join('')}</select><input id="v-qty" type="number" value="1" class="w-16"><button onclick="window.addGudang()" class="bg-blue-600 px-4 rounded-xl font-bold">+</button></div><button onclick="window.updateSpareInput(true)" class="text-[9px] text-orange-400 mt-2 underline">+ Barang Luar</button>`;
        }
    };

    window.addGudang = () => {
        const s = document.getElementById('v-spare'); const sel = s.selectedOptions[0]; if(!sel.value) return;
        keranjang.push({ stok_id: sel.value, nama: sel.text.split(' (')[0], harga: parseInt(sel.dataset.harga), qty: parseInt(document.getElementById('v-qty').value) });
        window.renderBasket(); window.calc();
    };

    window.addManual = () => {
        const n = document.getElementById('m-nama').value, h = parseInt(document.getElementById('m-harga').value), q = parseInt(document.getElementById('m-qty').value);
        if(!n || h <= 0) return;
        keranjang.push({ stok_id: null, nama: n, harga: h, qty: q });
        window.renderBasket(); window.calc();
    };

    window.renderBasket = () => { document.getElementById('basket-list').innerHTML = keranjang.map(i => `<div class="flex justify-between text-[10px] bg-white/5 p-2 rounded"><span>${i.nama} x${i.qty}</span><span>Rp ${(i.harga*i.qty).toLocaleString()}</span></div>`).join(''); };
    
    window.calc = () => {
        const totalPart = keranjang.reduce((acc, curr) => acc + (curr.harga * curr.qty), 0);
        const total = totalPart + parseInt(document.getElementById('v-jasa')?.value || 0);
        const sisa = total - parseInt(document.getElementById('v-bayar')?.value || 0);
        document.getElementById('v-sisa').innerText = "Sisa Tagihan: Rp " + sisa.toLocaleString();
    };

    window.printNotaFull = async (id) => {
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').eq('id', id).single();
        const tot = parseInt(s.jasa_service)+parseInt(s.biaya_sparepart);
        document.getElementById('print-area').innerHTML = `<div style="text-align:center"><div style="font-size:24px; font-weight:800;">GARAGE PRO</div></div><hr><p><b>Unit: ${s.kendaraan.plat}</b><br>Tgl: ${new Date(s.created_at).toLocaleString()}</p><table style="width:100%"><tr><td>Jasa</td><td style="text-align:right">Rp ${parseInt(s.jasa_service).toLocaleString()}</td></tr><tr><td>Sparepart</td><td style="text-align:right">Rp ${parseInt(s.biaya_sparepart).toLocaleString()}</td></tr></table><div style="margin-top:15px; text-align:right; border-top:2px solid #000">Total: Rp ${tot.toLocaleString()}<br><b>Bayar: Rp ${parseInt(s.uang_muka).toLocaleString()}</b><br>Sisa: Rp ${(tot-parseInt(s.uang_muka)).toLocaleString()}</div>`;
        window.print();
    };

    window.printReport = async () => {
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
        let total = 0;
        let rows = (s || []).map(x => { total += parseInt(x.uang_muka); return `<tr><td>${new Date(x.created_at).toLocaleDateString()}</td><td>${x.kendaraan?.plat}</td><td>Rp ${parseInt(x.uang_muka).toLocaleString()}</td></tr>`; }).join('');
        document.getElementById('print-area').innerHTML = `<h2 style="text-align:center">LAPORAN PEMASUKAN</h2><table border="1" style="width:100%; border-collapse:collapse;">${rows}</table><h3>Total: Rp ${total.toLocaleString()}</h3>`;
        window.print();
    };

    window.bayarSisaModal = (id, sisaAwal) => {
        const title = document.getElementById('modal-title'), body = document.getElementById('modal-body'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        title.innerText = "Pelunasan";
        body.innerHTML = `<p class="text-red-500 font-bold">Sisa: Rp ${sisaAwal.toLocaleString()}</p><input id="v-pelunasan" type="number" placeholder="Bayar Sisa">`;
        btn.onclick = async () => {
            const { data: cur } = await supabase.from('servis').select('*').eq('id', id).single();
            const baru = parseInt(cur.uang_muka) + parseInt(document.getElementById('v-pelunasan').value || 0);
            await supabase.from('servis').update({ uang_muka: baru }).eq('id', id);
            window.closeModal(); window.loadAll();
        };
    };

</script>
</body>
</html>
