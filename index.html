<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Je Garage Pro v7.8 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; margin: 0; -webkit-tap-highlight-color: transparent; }
        body::before { content: ""; position: fixed; inset: 0; background: url('https://i.postimg.cc/xCDV3vRZ/car-automobile-repair-shop-engine-motor-vehicle-service-maintenance-auto-parts-6c3120919a9a891118831.png') center/cover; opacity: 0.15; z-index: -1; }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 11px; }
        input, select { background: rgba(30, 30, 30, 0.9) !important; color: white !important; border: 1px solid #444 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; font-size: 14px; }
        .hidden { display: none !important; }
        #login-screen { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        @media print { body { background: none !important; color: #000 !important; } #dashboard-content, #modal-container, #login-screen, nav, header, button, .no-print { display: none !important; } #print-area { display: block !important; width: 100%; } }
    </style>
</head>
<body class="pb-24">

<div id="login-screen">
    <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg"><i class="fa-solid fa-screwdriver-wrench text-white text-2xl"></i></div>
    <h2 class="text-xl font-black text-orange-500 uppercase italic mb-8">JeGarage Pro</h2>
    <input type="password" id="pass-input" placeholder="Password" class="text-center font-bold tracking-widest max-w-xs mb-4">
    <button onclick="window.eksekusiLogin()" class="orange-gradient w-full max-w-xs py-4 rounded-xl font-black text-xs uppercase">Masuk</button>
</div>

<div id="print-area" class="hidden"></div>

<div id="dashboard-content" class="hidden max-w-4xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-car-side text-white text-xl"></i></div>
            <div><h1 class="text-lg font-black italic text-orange-500 uppercase leading-none">Je Garage</h1><p class="text-[7px] text-zinc-500 font-bold uppercase tracking-widest mt-1">v7.8 Final Build</p></div>
        </div>
        <div class="flex gap-2">
            <button onclick="window.loadAll()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-orange-500"><i class="fa-solid fa-sync"></i></button>
            <button onclick="window.eksekusiLogout()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <nav class="flex gap-6 border-b border-zinc-900 mb-8 overflow-x-auto no-scrollbar">
        <div id="btn-tab-database" onclick="window.switchTab('tab-database')" class="tab active">Database</div>
        <div id="btn-tab-servis" onclick="window.switchTab('tab-servis')" class="tab">Workshop</div>
        <div id="btn-tab-stok" onclick="window.switchTab('tab-stok')" class="tab">Gudang</div>
        <div id="btn-tab-finance" onclick="window.switchTab('tab-finance')" class="tab">Laporan</div>
    </nav>

    <div id="tab-database" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('pelanggan')" class="orange-gradient w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase shadow-lg shadow-orange-500/20">+ Pelanggan</button>
                <div id="list-pelanggan" class="space-y-3 max-h-[300px] overflow-y-auto"></div>
            </div>
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('kendaraan')" class="bg-zinc-800 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase">+ Unit Baru</button>
                <div id="list-kendaraan" class="space-y-3 max-h-[300px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <div id="tab-servis" class="tab-content hidden">
        <input type="text" id="search-ws" placeholder="Cari Plat..." oninput="window.renderWorkshop()" class="text-xs italic mb-4">
        <div id="list-pro-workshop" class="space-y-4"></div>
    </div>

    <div id="tab-stok" class="tab-content hidden">
        <button onclick="window.openModal('stok')" class="bg-blue-600 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase">+ Stok Barang</button>
        <div class="grid grid-cols-2 gap-4" id="list-stok"></div>
    </div>

    <div id="tab-finance" class="tab-content hidden">
        <div class="flex gap-2 mb-6">
            <select id="filter-finance" onchange="window.loadAll()" class="text-[10px] flex-1"><option value="hari">Hari Ini</option><option value="bulan">Bulan Ini</option><option value="semua">Semua</option></select>
            <button onclick="window.openModal('tambah_modal')" class="bg-emerald-600 px-4 rounded-xl text-[9px] font-bold uppercase">+ Modal</button>
            <button onclick="window.openModal('pengeluaran')" class="bg-red-600 px-4 rounded-xl text-[9px] font-bold uppercase">Biaya</button>
            <button onclick="window.printFinancialReport()" class="bg-zinc-800 px-4 rounded-xl text-[10px] border border-zinc-700"><i class="fa-solid fa-print"></i></button>
        </div>
        <div id="finance-stats" class="mb-6"></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-dark rounded-3xl p-5"><h3 class="text-[9px] font-black text-zinc-500 uppercase mb-4">Pemasukan</h3><div id="table-finance-body" class="space-y-3"></div></div>
            <div class="card-dark rounded-3xl p-5"><h3 class="text-[9px] font-black text-red-500 uppercase mb-4">Biaya & Modal</h3><div id="table-expense-body" class="space-y-3"></div></div>
        </div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-md">
    <div class="card-dark w-full max-w-lg p-6 rounded-[2rem] shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 id="modal-title" class="text-lg font-bold text-orange-500 mb-6 uppercase italic">Modal</h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex flex-col gap-2 mt-8">
            <button id="btn-execute" class="orange-gradient py-4 rounded-xl font-black text-xs uppercase tracking-widest">Simpan</button>
            <button onclick="window.closeModal()" class="bg-zinc-900 py-4 rounded-xl font-bold text-xs text-zinc-500 uppercase">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co", SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);
    const MASTER_PASS = "cuma123"; let keranjang = [], masterServis = [], masterExpenses = [];

    window.eksekusiLogin = () => { if(document.getElementById('pass-input').value === MASTER_PASS) { localStorage.setItem('garage_session', 'active'); location.reload(); } };
    window.eksekusiLogout = () => { if(confirm("Keluar?")) { localStorage.removeItem('garage_session'); location.reload(); } };
    if(localStorage.getItem('garage_session') === 'active') { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('dashboard-content').classList.remove('hidden'); setTimeout(() => window.loadAll(), 300); }

    window.switchTab = (id) => { document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.remove('hidden'); document.getElementById('btn-' + id).classList.add('active'); };

    window.loadAll = async () => {
        const { data: p } = await supabase.from('pelanggan').select('*').order('created_at', {ascending: false});
        const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending: false});
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
        const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');
        const { data: ex } = await supabase.from('pengeluaran').select('*').order('created_at', {ascending: false});
        masterServis = s || []; masterExpenses = ex || [];
        
        document.getElementById('list-pelanggan').innerHTML = p.map(i => `<div class="bg-zinc-900 p-3 rounded-xl flex justify-between text-sm"><span>${i.nama}</span><button onclick="window.hapus('pelanggan','${i.id}')" class="text-zinc-700"><i class="fa-solid fa-trash"></i></button></div>`).join('');
        document.getElementById('list-kendaraan').innerHTML = k.map(i => `<div class="bg-zinc-900/40 p-3 rounded-xl flex justify-between items-center border border-zinc-900 mb-2"><div><p class="text-xs font-bold text-orange-500">${i.plat}</p><p class="text-[9px] text-zinc-600">${i.pelanggan?.nama || '-'}</p></div><button onclick="window.openModal('servis', '${i.id}')" class="bg-orange-600/10 text-orange-500 px-3 py-2 rounded-lg text-[9px] font-black uppercase">Servis</button></div>`).join('');
        document.getElementById('list-stok').innerHTML = st.map(i => `<div class="card-dark p-3 rounded-2xl border-l-4 ${i.jumlah_stok < 5 ? 'border-red-600' : 'border-blue-500'} flex justify-between items-center"><div><p class="text-[8px] text-zinc-500 uppercase">${i.nama_barang}</p><h4 class="text-base font-black">${i.jumlah_stok}</h4></div><button onclick="window.hapus('stok_sparepart','${i.id}')" class="text-zinc-800"><i class="fa-solid fa-trash"></i></button></div>`).join('');
        window.renderWorkshop(); window.updateFinanceUI(s, ex);
    };

    window.renderWorkshop = () => {
        const query = document.getElementById('search-ws').value.toUpperCase();
        const filtered = masterServis.filter(x => x.kendaraan?.plat?.toUpperCase().includes(query));
        document.getElementById('list-pro-workshop').innerHTML = filtered.map(x => {
            const tot = (x.jasa_service || 0) + (x.biaya_sparepart || 0), sisa = tot - (x.uang_muka || 0);
            return `<div class="card-dark p-5 rounded-[1.5rem] border-l-4 ${sisa > 0 ? 'border-red-600' : 'border-emerald-600'}">
                <div class="flex justify-between items-start">
                    <div><h3 class="text-lg font-black text-orange-500 italic">${x.kendaraan?.plat}</h3><p class="text-[9px] text-zinc-500 uppercase">${x.kendaraan?.pelanggan?.nama || '-'}</p></div>
                    <button onclick="window.printNotaFull('${x.id}')" class="text-orange-500"><i class="fa-solid fa-print"></i></button>
                </div>
                <p class="text-[9px] text-zinc-400 mt-2 italic">Kerja: ${x.keluhan}</p>
                <div class="mt-3 flex justify-between items-center pt-3 border-t border-white/5">
                    ${sisa > 0 ? `<button onclick="window.bayarSisaModal('${x.id}', ${sisa})" class="bg-red-600 text-white px-3 py-1 rounded text-[8px] font-bold">LUNASI</button>` : '<span class="text-emerald-500 text-[10px] font-black italic">LUNAS</span>'}
                    <p class="font-black text-xs">Rp ${sisa.toLocaleString()}</p>
                </div></div>`;
        }).join('');
    };

    window.printNotaFull = async (id) => {
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').eq('id', id).single();
        const { data: detail } = await supabase.from('detail_servis').select('*, stok_sparepart(nama_barang)').eq('servis_id', id);
        const t = new Date(s.created_at), tot = (s.jasa_service || 0) + (s.biaya_sparepart || 0), sisa = tot - (s.uang_muka || 0);
        let items = (detail || []).map(d => `<tr><td style="font-size:10px;">${d.stok_sparepart?.nama_barang || 'Part'} (x${d.jumlah})</td><td align="right" style="font-size:10px;">${(d.harga_satuan*d.jumlah).toLocaleString()}</td></tr>`).join('');
        document.getElementById('print-area').innerHTML = `<div style="font-family:monospace; padding:10px; color:#000;"><center><h2 style="margin:0">JE GARAGE</h2><p style="font-size:10px">${t.toLocaleDateString()} | ${t.toLocaleTimeString()}</p></center><hr border="0.5px dashed">
            <table width="100%" style="font-size:10px"><tr><td>Unit</td><td>: ${s.kendaraan?.plat} (${s.kendaraan?.pelanggan?.nama})</td></tr><tr><td>Kerja</td><td>: ${s.keluhan.toUpperCase()}</td></tr></table><hr border="0.5px dashed">
            <table width="100%"><tr><td style="font-size:10px">Jasa</td><td align="right" style="font-size:10px">${parseInt(s.jasa_service).toLocaleString()}</td></tr>${items}</table><hr border="0.5px dashed">
            <table width="100%" style="font-weight:bold; font-size:11px"><tr><td>Total</td><td align="right">${tot.toLocaleString()}</td></tr><tr><td>Bayar</td><td align="right">${parseInt(s.uang_muka).toLocaleString()}</td></tr><tr><td>${sisa>0?'Sisa':'STATUS'}</td><td align="right">${sisa>0?sisa.toLocaleString():'LUNAS'}</td></tr></table></div>`;
        window.print();
    };

    window.updateFinanceUI = (s, ex) => {
        const filter = document.getElementById('filter-finance').value, now = new Date();
        const fS = s.filter(x => { const d = new Date(x.created_at); return filter==='hari'?d.toDateString()===now.toDateString():filter==='bulan'?d.getMonth()===now.getMonth():true; });
        const fE = ex.filter(x => { const d = new Date(x.created_at); return filter==='hari'?d.toDateString()===now.toDateString():filter==='bulan'?d.getMonth()===now.getMonth():true; });
        let tunai = 0, keluar = 0, modal = 0;
        fS.forEach(x => { if(x.metode_bayar!=='Transfer') tunai += parseInt(x.uang_muka || 0); });
        fE.forEach(x => { if(x.nominal < 0) modal += Math.abs(x.nominal); else keluar += parseInt(x.nominal); });
        document.getElementById('finance-stats').innerHTML = `<div class="card-dark p-5 rounded-2xl border-l-4 border-emerald-500"><p class="text-[8px] text-zinc-500 uppercase font-bold">Saldo Kas (Tunai)</p><h2 class="text-2xl font-black text-emerald-500">Rp ${(tunai + modal - keluar).toLocaleString()}</h2></div>`;
        document.getElementById('table-finance-body').innerHTML = fS.map(x => `<div class="flex justify-between text-[10px] border-b border-white/5 pb-2"><span>${x.kendaraan?.plat || '-'}</span><span class="font-bold">Rp ${parseInt(x.uang_muka).toLocaleString()}</span></div>`).join('');
        document.getElementById('table-expense-body').innerHTML = fE.map(x => `<div class="flex justify-between text-[10px] border-b border-white/5 pb-2"><span>${x.keterangan}</span><span class="${x.nominal<0?'text-emerald-500':'text-red-500'}">Rp ${Math.abs(x.nominal).toLocaleString()}</span></div>`).join('');
    };

    window.openModal = async (type, id = null) => {
        const b = document.getElementById('modal-body'), t = document.getElementById('modal-title'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        if(type==='tambah_modal'){ t.innerText="Tambah Modal"; b.innerHTML=`<input id="m-ket" placeholder="Ket"><input id="m-nom" type="number" placeholder="Rp">`; btn.onclick=async()=>{ await supabase.from('pengeluaran').insert([{keterangan:"[MODAL] "+document.getElementById('m-ket').value, nominal:-Math.abs(document.getElementById('m-nom').value)}]); window.closeModal(); window.loadAll();};}
        else if(type==='pengeluaran'){ t.innerText="Catat Biaya"; b.innerHTML=`<input id="e-ket" placeholder="Ket"><input id="e-nom" type="number" placeholder="Rp">`; btn.onclick=async()=>{ await supabase.from('pengeluaran').insert([{keterangan:document.getElementById('e-ket').value, nominal:document.getElementById('e-nom').value}]); window.closeModal(); window.loadAll();};}
        else if(type==='pelanggan'){ t.innerText="Pelanggan"; b.innerHTML=`<input id="p-nama" placeholder="Nama">`; btn.onclick=async()=>{ await supabase.from('pelanggan').insert([{nama:document.getElementById('p-nama').value}]); window.closeModal(); window.loadAll();};}
        else if(type==='kendaraan'){ 
            const { data: pL } = await supabase.from('pelanggan').select('*');
            t.innerText="Unit Baru"; b.innerHTML=`<select id="p-sel">${pL.map(x=>`<option value="${x.id}">${x.nama}</option>`).join('')}</select><input id="p-plat" class="uppercase" placeholder="Plat">`;
            btn.onclick=async()=>{ await supabase.from('kendaraan').insert([{pelanggan_id:document.getElementById('p-sel').value, plat:document.getElementById('p-plat').value.toUpperCase()}]); window.closeModal(); window.loadAll();};
        }
        else if(type==='servis'){
            t.innerText="Input Workshop"; b.innerHTML=`<input id="s-kel" placeholder="Pekerjaan"><input id="s-jasa" type="number" placeholder="Jasa Rp"><div class="bg-zinc-900 p-4 rounded-xl"><div id="spare-area"></div><div id="bsk" class="mt-2 text-[10px]"></div></div><div class="grid grid-cols-2 gap-2"><select id="s-met"><option value="Tunai">Tunai</option><option value="Transfer">Transfer</option></select><input id="s-bayar" type="number" placeholder="Bayar Rp"></div>`;
            window.updateSpareArea(false);
            btn.onclick=async()=>{
                const totP = keranjang.reduce((a,b)=>a+(b.harga*b.qty),0);
                const { data: n } = await supabase.from('servis').insert([{kendaraan_id:id, keluhan:document.getElementById('s-kel').value, jasa_service:document.getElementById('s-jasa').value||0, biaya_sparepart:totP, uang_muka:document.getElementById('s-bayar').value||0, metode_bayar:document.getElementById('s-met').value}]).select().single();
                for(let it of keranjang){
                    await supabase.from('detail_servis').insert([{servis_id:n.id, stok_id:it.stok_id, jumlah:it.qty, harga_satuan:it.harga}]);
                    if(it.stok_id){ const {data:c}=await supabase.from('stok_sparepart').select('jumlah_stok').eq('id',it.stok_id).single(); await supabase.from('stok_sparepart').update({jumlah_stok:c.jumlah_stok-it.qty}).eq('id',it.stok_id); }
                }
                window.closeModal(); window.loadAll();
            };
        }
        else if(type==='stok'){ t.innerText="Stok Barang"; b.innerHTML=`<input id="st-n" placeholder="Nama"><input id="st-h" type="number" placeholder="Harga Jual"><input id="st-j" type="number" placeholder="Jumlah">`; btn.onclick=async()=>{ await supabase.from('stok_sparepart').insert([{nama_barang:document.getElementById('st-n').value, harga_jual_satuan:document.getElementById('st-h').value, jumlah_stok:document.getElementById('st-j').value, satuan:'Pcs'}]); window.closeModal(); window.loadAll();};}
    };

    window.updateSpareArea = async (m) => {
        const a = document.getElementById('spare-area');
        if(m) { a.innerHTML=`<input id="m-n" placeholder="Part Luar"><input id="m-h" type="number" placeholder="Harga"><button onclick="window.addM()" class="w-full bg-orange-600 py-2 rounded-lg mt-2 text-[10px] font-bold">Add Part</button><button onclick="window.updateSpareArea(false)" class="text-[8px] text-blue-400 mt-2 block">Gudang</button>`; }
        else {
            const {data:st}=await supabase.from('stok_sparepart').select('*');
            a.innerHTML=`<select id="v-sp">${st.map(x=>`<option value="${x.id}" data-h="${x.harga_jual_satuan}">${x.nama_barang}</option>`).join('')}</select><input id="v-q" type="number" value="1"><button onclick="window.addG()" class="w-full bg-blue-600 py-2 rounded-lg mt-2 text-[10px] font-bold">Add Gudang</button><button onclick="window.updateSpareArea(true)" class="text-[8px] text-orange-400 mt-2 block">Luar</button>`;
        }
    };
    window.addG=()=>{ const s=document.getElementById('v-sp').selectedOptions[0]; keranjang.push({stok_id:s.value, nama:s.text, harga:parseInt(s.dataset.h), qty:parseInt(document.getElementById('v-q').value)}); window.renderBsk(); };
    window.addM=()=>{ keranjang.push({stok_id:null, nama:document.getElementById('m-n').value, harga:parseInt(document.getElementById('m-h').value), qty:1}); window.renderBsk(); };
    window.renderBsk=()=>{ document.getElementById('bsk').innerHTML=keranjang.map(i=>`<div>${i.nama} x${i.qty}</div>`).join(''); };
    window.closeModal=()=>{ document.getElementById('modal-container').classList.add('hidden'); keranjang=[]; };
    window.hapus=async(t,id)=>{ if(confirm("Hapus?")){ await supabase.from(t).delete().eq('id',id); window.loadAll(); } };
</script>
</body>
</html>
