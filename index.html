<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Je Garage Pro v8.9.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; margin: 0; }
        body::before { content: ""; position: fixed; inset: 0; background: url('https://i.postimg.cc/xCDV3vRZ/car-automobile-repair-shop-engine-motor-vehicle-service-maintenance-auto-parts-6c3120919a9a891118831.png') center/cover; opacity: 0.12; z-index: -1; }
        .main-container { max-width: 1200px; margin: 0 auto; min-height: 100vh; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px); border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(255,255,255,0.1); }
        .tab { opacity: 0.4; cursor: pointer; padding: 12px 16px; font-weight: 800; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; border-bottom: 3px solid transparent; }
        .tab.active { color: #f97316; border-bottom-color: #f97316; opacity: 1; background: rgba(249, 115, 22, 0.05); }
        input, select { background: rgba(30, 30, 30, 0.9) !important; color: white !important; border: 1px solid #444 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .hidden { display: none !important; }
        
        @media print {
            body { background: white !important; color: black !important; }
            #dashboard-content, #modal-container, #login-screen, nav, header { display: none !important; }
            #print-area { display: block !important; padding: 20px; color: black !important; }
            table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            th, td { border: 1px solid black; padding: 8px; text-align: left; font-size: 12px; }
        }
    </style>
</head>
<body class="pb-10">

<div class="main-container">
    <div id="login-screen" class="fixed inset-0 bg-[#050505] z-[2000] flex flex-col items-center justify-center p-6">
        <h2 class="text-2xl font-black text-orange-500 uppercase italic mb-8">Je Garage Pro</h2>
        <input type="password" id="pass-input" placeholder="PASSWORD" class="text-center font-bold tracking-[0.5em] max-w-xs mb-4">
        <button onclick="window.eksekusiLogin()" class="orange-gradient w-full max-w-xs py-4 rounded-xl font-black text-xs uppercase shadow-lg">Login System</button>
    </div>

    <div id="print-area" class="hidden"></div>

    <div id="dashboard-content" class="hidden p-4 md:p-8">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 orange-gradient rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/20"><i class="fa-solid fa-car-side text-white text-xl"></i></div>
                <div>
                    <h1 class="text-lg font-black italic text-orange-500 uppercase leading-none">Je Garage Pro</h1>
                    <p class="text-[8px] text-zinc-500 font-bold uppercase mt-1">Management System v8.9.1</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="window.loadAll()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-orange-500 transition hover:bg-orange-500 hover:text-white"><i class="fa-solid fa-sync"></i></button>
                <button onclick="window.eksekusiLogout()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-red-500 transition hover:bg-red-500 hover:text-white"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <nav class="flex border-b border-zinc-900 mb-8 overflow-x-auto no-scrollbar">
            <div id="btn-tab-database" onclick="window.switchTab('tab-database')" class="tab active"><i class="fa-solid fa-database"></i> Database</div>
            <div id="btn-tab-servis" onclick="window.switchTab('tab-servis')" class="tab"><i class="fa-solid fa-screwdriver-wrench"></i> Workshop</div>
            <div id="btn-tab-stok" onclick="window.switchTab('tab-stok')" class="tab"><i class="fa-solid fa-box-open"></i> Gudang</div>
            <div id="btn-tab-finance" onclick="window.switchTab('tab-finance')" class="tab"><i class="fa-solid fa-file-invoice-dollar"></i> Laporan</div>
        </nav>

        <div id="tab-database" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card-dark p-6 rounded-[2rem]"><button onclick="window.openModal('pelanggan')" class="orange-gradient w-full py-4 rounded-xl font-black mb-4 text-[10px] uppercase shadow-lg">+ Pelanggan</button><div id="list-pelanggan" class="space-y-2 max-h-[400px] overflow-y-auto"></div></div>
                <div class="card-dark p-6 rounded-[2rem]"><button onclick="window.openModal('kendaraan')" class="bg-zinc-800 w-full py-4 rounded-xl font-black mb-4 text-[10px] uppercase border border-zinc-700">+ Unit Baru</button><div id="list-kendaraan" class="space-y-2 max-h-[400px] overflow-y-auto"></div></div>
            </div>
        </div>

        <div id="tab-servis" class="tab-content hidden">
            <input type="text" id="search-ws" placeholder="Cari Plat Nomor..." oninput="window.renderWorkshop()" class="mb-6 max-w-xs italic text-xs">
            <div id="list-pro-workshop" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="tab-stok" class="tab-content hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xs font-black uppercase italic tracking-widest">Inventory Sparepart</h2>
                <button onclick="window.openModal('stok')" class="bg-blue-600 px-6 py-3 rounded-xl font-black text-[9px] uppercase shadow-lg shadow-blue-500/20"><i class="fa-solid fa-plus mr-2"></i> Tambah Stok Barang</button>
            </div>
            <div id="list-stok" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

        <div id="tab-finance" class="tab-content hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-4">
                    <div class="card-dark p-6 rounded-[2rem] border-l-4 border-orange-500">
                        <select id="filter-finance" onchange="window.loadAll()" class="mb-4 text-[10px] font-black uppercase"><option value="hari">Hari Ini</option><option value="bulan">Bulan Ini</option></select>
                        <div class="grid grid-cols-2 gap-2 mb-4">
                            <button onclick="window.openModal('tambah_modal')" class="bg-emerald-600 py-3 rounded-xl text-[9px] font-bold uppercase">Modal</button>
                            <button onclick="window.openModal('pengeluaran')" class="bg-red-600 py-3 rounded-xl text-[9px] font-bold uppercase">Biaya</button>
                        </div>
                        <button onclick="window.printFinancialReport()" class="w-full bg-zinc-800 border border-zinc-700 py-3 rounded-xl text-[9px] font-black uppercase"><i class="fa-solid fa-print mr-2"></i> Cetak Laporan Keuangan</button>
                    </div>
                    <div id="jurnal-summary-area"></div>
                </div>
                <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="card-dark p-6 rounded-3xl border-l-4 border-emerald-500"><h3 class="text-[10px] font-black text-emerald-500 uppercase mb-4 italic">Jurnal Pemasukan</h3><div id="jurnal-in-body" class="space-y-3 text-[11px]"></div></div>
                    <div class="card-dark p-6 rounded-3xl border-l-4 border-red-500"><h3 class="text-[10px] font-black text-red-500 uppercase mb-4 italic">Jurnal Pengeluaran</h3><div id="jurnal-out-body" class="space-y-3 text-[11px]"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[3000] backdrop-blur-md">
    <div class="card-dark w-full max-w-lg p-8 rounded-[2.5rem] overflow-y-auto max-h-[90vh] shadow-2xl">
        <h3 id="modal-title" class="text-xl font-bold text-orange-500 mb-6 uppercase italic tracking-widest">Modal Title</h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="mt-8 flex flex-col gap-2">
            <button id="btn-execute" class="orange-gradient py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-orange-500/10">Simpan Data</button>
            <button onclick="window.closeModal()" class="text-zinc-500 font-bold text-[10px] uppercase py-2 hover:text-white">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co", SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);
    const MASTER_PASS = "cuma123"; let keranjang = [], masterS = [], masterE = [];

    window.eksekusiLogin = () => { if(document.getElementById('pass-input').value === MASTER_PASS) { localStorage.setItem('garage_session', 'active'); location.reload(); } else { alert("Password Salah!"); } };
    window.eksekusiLogout = () => { if(confirm("Keluar?")) { localStorage.removeItem('garage_session'); location.reload(); } };
    if(localStorage.getItem('garage_session') === 'active') { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('dashboard-content').classList.remove('hidden'); window.loadAll(); }

    window.switchTab = (id) => { document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.remove('hidden'); document.getElementById('btn-' + id).classList.add('active'); };

    window.loadAll = async () => {
        const { data: p } = await supabase.from('pelanggan').select('*').order('created_at', {ascending: false});
        const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending: false});
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
        const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');
        const { data: ex } = await supabase.from('pengeluaran').select('*').order('created_at', {ascending: false});
        masterS = s || []; masterE = ex || [];
        
        document.getElementById('list-pelanggan').innerHTML = p.map(i => `<div class="bg-zinc-900/50 p-3 rounded-lg flex justify-between text-[10px] border border-zinc-800"><span>${i.nama}</span><button onclick="window.hapus('pelanggan','${i.id}')" class="text-zinc-700 hover:text-red-500"><i class="fa-solid fa-trash"></i></button></div>`).join('');
        document.getElementById('list-kendaraan').innerHTML = k.map(i => `<div class="bg-zinc-900/50 p-3 rounded-lg flex justify-between items-center border border-zinc-800"><div><p class="text-xs font-bold text-orange-500 italic">${i.plat}</p><p class="text-[9px] text-zinc-600 uppercase font-bold">${i.pelanggan?.nama || '-'}</p></div><button onclick="window.openModal('servis', '${i.id}')" class="bg-orange-600/10 text-orange-500 px-3 py-1 rounded text-[8px] font-black uppercase hover:bg-orange-500 hover:text-white">Servis</button></div>`).join('');
        document.getElementById('list-stok').innerHTML = st.map(i => `<div class="card-dark p-4 rounded-xl border-l-4 ${i.jumlah_stok < 5 ? 'border-red-600 animate-pulse' : 'border-blue-500'} flex justify-between items-center"><div><p class="text-[8px] text-zinc-500 uppercase font-bold">${i.nama_barang}</p><h4 class="text-sm font-black">${i.jumlah_stok} <span class="opacity-30 text-[9px]">Pcs</span></h4></div><button onclick="window.hapus('stok_sparepart','${i.id}')" class="text-zinc-800 hover:text-red-500"><i class="fa-solid fa-trash"></i></button></div>`).join('');
        window.renderWorkshop(); window.updateFinanceUI();
    };

    window.renderWorkshop = () => {
        const query = document.getElementById('search-ws').value.toUpperCase();
        const filtered = masterS.filter(x => x.kendaraan?.plat?.toUpperCase().includes(query));
        document.getElementById('list-pro-workshop').innerHTML = filtered.map(x => {
            const tot = (parseInt(x.jasa_service) || 0) + (parseInt(x.biaya_sparepart) || 0), sisa = tot - (parseInt(x.uang_muka) || 0);
            return `<div class="card-dark p-6 rounded-[1.5rem] border-l-4 ${sisa > 0 ? 'border-red-600' : 'border-emerald-600'}">
                <div class="flex justify-between items-start">
                    <div><h3 class="text-base font-black text-orange-500 italic">${x.kendaraan?.plat}</h3><p class="text-[9px] text-zinc-500 uppercase font-bold">${x.kendaraan?.pelanggan?.nama || '-'}</p></div>
                    <button onclick="window.printNotaFull('${x.id}')" class="text-orange-500 hover:scale-110 transition"><i class="fa-solid fa-print"></i></button>
                </div>
                <p class="text-[10px] text-zinc-400 mt-2 italic font-medium">${x.keluhan}</p>
                <div class="mt-4 flex justify-between items-center pt-3 border-t border-white/5">
                    ${sisa > 0 ? `<button onclick="window.bayarSisaModal('${x.id}', ${sisa})" class="bg-red-600 px-3 py-1 rounded text-[8px] font-black uppercase shadow-lg shadow-red-500/20">Bayar Sisa</button>` : '<span class="text-emerald-500 text-[10px] font-black italic">✓ LUNAS</span>'}
                    <p class="font-black text-xs">Rp ${tot.toLocaleString()}</p>
                </div></div>`;
        }).join('');
    };

    window.updateFinanceUI = () => {
        const f = document.getElementById('filter-finance').value, now = new Date();
        const fS = masterS.filter(x => { const d = new Date(x.created_at); return f==='hari'?d.toDateString()===now.toDateString():f==='bulan'?d.getMonth()===now.getMonth():true; });
        const fE = masterE.filter(x => { const d = new Date(x.created_at); return f==='hari'?d.toDateString()===now.toDateString():f==='bulan'?d.getMonth()===now.getMonth():true; });
        let tunai = 0, bank = 0, keluar = 0, modal = 0;
        fS.forEach(x => { if(x.metode_bayar==='Transfer') bank += parseInt(x.uang_muka || 0); else tunai += parseInt(x.uang_muka || 0); });
        fE.forEach(x => { if(x.nominal < 0) modal += Math.abs(x.nominal); else keluar += parseInt(x.nominal || 0); });
        const saldoLaci = (tunai + modal) - keluar;
        document.getElementById('jurnal-summary-area').innerHTML = `<div class="card-dark p-6 rounded-[2rem] border-l-4 border-emerald-500 shadow-xl"><p class="text-[8px] text-zinc-500 font-black uppercase mb-1">Saldo Bersih (Laci)</p><h2 class="text-2xl font-black text-emerald-500 tracking-tighter">Rp ${saldoLaci.toLocaleString()}</h2></div>`;
        document.getElementById('jurnal-in-body').innerHTML = fS.map(x => `<div class="flex justify-between border-b border-white/5 pb-2"><span>${x.kendaraan?.plat}</span><span class="font-bold text-emerald-500">Rp ${parseInt(x.uang_muka).toLocaleString()}</span></div>`).join('') + (modal > 0 ? `<div class="bg-emerald-500/10 p-2 rounded text-[10px] font-bold mt-2 text-emerald-400">MODAL MASUK: Rp ${modal.toLocaleString()}</div>` : '');
        document.getElementById('jurnal-out-body').innerHTML = fE.filter(e => e.nominal > 0).map(x => `<div class="flex justify-between border-b border-white/5 pb-2"><span>${x.keterangan}</span><span class="font-bold text-red-500">Rp ${x.nominal.toLocaleString()}</span></div>`).join('');
    };

    window.printFinancialReport = () => {
        const sum = document.getElementById('jurnal-summary-area').innerText;
        const ins = document.getElementById('jurnal-in-body').innerHTML;
        const outs = document.getElementById('jurnal-out-body').innerHTML;
        document.getElementById('print-area').innerHTML = `
            <div style="color:black; font-family:sans-serif;">
                <center><h2>LAPORAN KEUANGAN JE GARAGE</h2><p>${new Date().toLocaleString()}</p></center><hr>
                <h3>RINGKASAN SALDO</h3><div style="font-size:1.5rem; font-weight:bold; color:green">${sum}</div><hr>
                <div style="display:flex; gap:50px">
                    <div style="flex:1"><h3>PEMASUKAN</h3>${ins}</div>
                    <div style="flex:1"><h3>PENGELUARAN</h3>${outs}</div>
                </div>
            </div>`;
        window.print();
    };

    window.openModal = async (type, id = null) => {
        const b = document.getElementById('modal-body'), t = document.getElementById('modal-title'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        if(type==='tambah_modal'){ t.innerText="Input Modal"; b.innerHTML=`<input id="m-ket" placeholder="Keterangan Modal..."><input id="m-nom" type="number" placeholder="Nominal Rp">`; btn.onclick=async()=>{ await supabase.from('pengeluaran').insert([{keterangan:"[MODAL] "+document.getElementById('m-ket').value, nominal:-Math.abs(document.getElementById('m-nom').value)}]); window.closeModal(); window.loadAll();};}
        else if(type==='pengeluaran'){ t.innerText="Input Pengeluaran"; b.innerHTML=`<input id="e-ket" placeholder="Keperluan..."><input id="e-nom" type="number" placeholder="Nominal Rp">`; btn.onclick=async()=>{ await supabase.from('pengeluaran').insert([{keterangan:document.getElementById('e-ket').value, nominal:document.getElementById('e-nom').value}]); window.closeModal(); window.loadAll();};}
        else if(type==='pelanggan'){ t.innerText="Tambah Pelanggan"; b.innerHTML=`<input id="p-nama" placeholder="Nama Lengkap">`; btn.onclick=async()=>{ await supabase.from('pelanggan').insert([{nama:document.getElementById('p-nama').value}]); window.closeModal(); window.loadAll();};}
        else if(type==='kendaraan'){ 
            const { data: pL } = await supabase.from('pelanggan').select('*');
            t.innerText="Register Unit"; b.innerHTML=`<select id="p-sel">${pL.map(x=>`<option value="${x.id}">${x.nama}</option>`).join('')}</select><input id="p-plat" class="uppercase font-bold" placeholder="PLAT NOMOR">`;
            btn.onclick=async()=>{ await supabase.from('kendaraan').insert([{pelanggan_id:document.getElementById('p-sel').value, plat:document.getElementById('p-plat').value.toUpperCase()}]); window.closeModal(); window.loadAll();};
        }
        else if(type==='servis'){
            t.innerText="Workshop Input"; b.innerHTML=`<input id="s-kel" placeholder="Deskripsi Pekerjaan"><input id="s-jasa" type="number" placeholder="Jasa Rp" oninput="window.calc()"><div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800"><div id="spare-area"></div><div id="bsk" class="mt-4 text-[10px] text-zinc-500 font-bold"></div></div><div class="grid grid-cols-2 gap-2 mt-4"><select id="s-met"><option value="Tunai">Tunai</option><option value="Transfer">Transfer</option></select><input id="s-bayar" type="number" placeholder="DP/Bayar Rp" oninput="window.calc()"></div><p id="v-sisa" class="text-xs text-red-500 font-bold mt-2 italic">Sisa: Rp 0</p>`;
            window.updateSpareArea();
            btn.onclick=async()=>{
                const totP = keranjang.reduce((a,b)=>a+(b.harga*b.qty),0);
                const { data: n } = await supabase.from('servis').insert([{kendaraan_id:id, keluhan:document.getElementById('s-kel').value, jasa_service:document.getElementById('s-jasa').value||0, biaya_sparepart:totP, uang_muka:document.getElementById('s-bayar').value||0, metode_bayar:document.getElementById('s-met').value}]).select().single();
                for(let it of keranjang){
                    await supabase.from('detail_servis').insert([{servis_id:n.id, stok_id:it.stok_id, jumlah:it.qty, harga_satuan:it.harga}]);
                    if(it.stok_id){ const {data:c}=await supabase.from('stok_sparepart').select('jumlah_stok').eq('id',it.stok_id).single(); await supabase.from('stok_sparepart').update({jumlah_stok:c.jumlah_stok-it.qty}).eq('id',it.stok_id); }
                }
                window.closeModal(); window.loadAll();
            };
        }
        else if(type==='stok'){ 
            t.innerText="Tambah Barang Gudang"; 
            b.innerHTML=`<input id="st-n" placeholder="Nama Barang Sparepart"><input id="st-h" type="number" placeholder="Harga Jual Satuan Rp"><input id="st-j" type="number" placeholder="Jumlah Stok Awal">`; 
            btn.onclick=async()=>{ 
                const nama = document.getElementById('st-n').value;
                const harga = document.getElementById('st-h').value;
                const jumlah = document.getElementById('st-j').value;
                if(!nama || !harga || !jumlah) return alert("Isi semua data!");
                const { error } = await supabase.from('stok_sparepart').insert([{nama_barang: nama, harga_jual_satuan: parseInt(harga), jumlah_stok: parseInt(jumlah), satuan:'Pcs'}]);
                if(error) { alert("Gagal Simpan: "+error.message); } else { window.closeModal(); window.loadAll(); }
            };
        }
    };

    window.updateSpareArea = async () => {
        const {data:st}=await supabase.from('stok_sparepart').select('*');
        document.getElementById('spare-area').innerHTML = `<select id="v-sp" class="mb-2">${st.map(x=>`<option value="${x.id}" data-h="${x.harga_jual_satuan}">${x.nama_barang} (Rp ${parseInt(x.harga_jual_satuan).toLocaleString()})</option>`).join('')}</select><div class="flex gap-2"><input id="v-q" type="number" value="1" class="flex-1"><button onclick="window.addG()" class="bg-blue-600 px-4 rounded-xl text-[10px] font-black uppercase">Pilih</button></div><button onclick="window.addPartLuar()" class="text-[9px] text-orange-500 mt-3 font-bold uppercase block mx-auto">+ Input Part Luar (Manual)</button>`;
    };
    window.addG=()=>{ const s=document.getElementById('v-sp').selectedOptions[0]; keranjang.push({stok_id:s.value, nama:s.text.split('(')[0], harga:parseInt(s.dataset.h), qty:parseInt(document.getElementById('v-q').value)}); window.renderBsk(); window.calc(); };
    window.addPartLuar=()=>{ const n=prompt("Nama Part Luar:"), h=prompt("Harga:"); if(n&&h){ keranjang.push({stok_id:null, nama:n, harga:parseInt(h), qty:1}); window.renderBsk(); window.calc(); } };
    window.renderBsk=()=>{ document.getElementById('bsk').innerHTML=keranjang.map(i=>`<div class="border-b border-white/5 pb-1 opacity-70">• ${i.nama} x${i.qty}</div>`).join(''); };
    window.calc=()=>{ const totP = keranjang.reduce((a,b)=>a+(b.harga*b.qty),0); const sisa = (totP + parseInt(document.getElementById('s-jasa')?.value || 0)) - parseInt(document.getElementById('s-bayar')?.value || 0); document.getElementById('v-sisa').innerText = "Sisa Tagihan: Rp " + sisa.toLocaleString(); };

    window.bayarSisaModal = (id, sisaAwal) => {
        const title = document.getElementById('modal-title'), body = document.getElementById('modal-body'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        title.innerText = "Pelunasan Sisa";
        body.innerHTML = `<p class="text-red-500 font-black text-center mb-4 text-lg tracking-tighter">SISA: Rp ${sisaAwal.toLocaleString()}</p><input id="v-pel" type="number" placeholder="Nominal Bayar Rp">`;
        btn.onclick = async () => {
            const { data: cur } = await supabase.from('servis').select('uang_muka').eq('id', id).single();
            await supabase.from('servis').update({ uang_muka: parseInt(cur.uang_muka) + parseInt(document.getElementById('v-pel').value || 0) }).eq('id', id);
            window.closeModal(); window.loadAll();
        };
    };

    window.printNotaFull = async (id) => {
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').eq('id', id).single();
        const tot = (parseInt(s.jasa_service) || 0) + (parseInt(s.biaya_sparepart) || 0);
        document.getElementById('print-area').innerHTML = `<div style="color:black; padding:40px; border:2px solid black;"><h2>NOTA JE GARAGE</h2><hr>UNIT: ${s.kendaraan?.plat}<br>PELANGGAN: ${s.kendaraan?.pelanggan?.nama}<hr>TOTAL: Rp ${tot.toLocaleString()}<br>BAYAR: Rp ${parseInt(s.uang_muka).toLocaleString()}<br>STATUS: ${tot-s.uang_muka>0?'BELUM LUNAS':'LUNAS'}</div>`;
        window.print();
    };

    window.closeModal=()=>{ document.getElementById('modal-container').classList.add('hidden'); keranjang=[]; };
    window.hapus=async(t,id)=>{ if(confirm("Hapus data secara permanen?")){ await supabase.from(t).delete().eq('id',id); window.loadAll(); } };
</script>
</body>
</html>
