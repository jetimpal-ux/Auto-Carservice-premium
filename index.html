<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garage Pro v7.2 - Nota with Date</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('https://i.postimg.cc/xCDV3vRZ/car-automobile-repair-shop-engine-motor-vehicle-service-maintenance-auto-parts-6c3120919a9a891118831.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; margin: 0; -webkit-tap-highlight-color: transparent; 
        }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 11px; }
        input, select { background: rgba(30, 30, 30, 0.9) !important; color: white !important; border: 1px solid #444 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .hidden { display: none !important; }
        #login-screen { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        @media print {
            body { background: white !important; color: black !important; padding: 0; margin: 0; }
            #dashboard-content, #modal-container, #login-screen, nav, header { display: none !important; }
            #print-area { display: block !important; width: 100%; padding: 10px; color: black !important; font-family: 'Courier New', Courier, monospace; }
            hr { border: 1px dashed black !important; }
        }
    </style>
</head>
<body class="pb-24">

<div id="login-screen">
    <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg">
        <i class="fa-solid fa-screwdriver-wrench text-white text-2xl"></i>
    </div>
    <h2 class="text-xl font-black text-orange-500 uppercase italic mb-8">Garage Pro Login</h2>
    <div class="w-full max-w-xs space-y-4">
        <input type="text" id="pass-input" placeholder="Password" class="text-center font-bold tracking-widest">
        <button id="btn-login-action" class="orange-gradient w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest">Masuk</button>
        <p id="login-msg" class="text-[10px] text-red-500 text-center font-bold uppercase hidden italic">Password Salah!</p>
    </div>
</div>

<div id="print-area" class="hidden text-black p-4"></div>

<div id="dashboard-content" class="hidden max-w-4xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-car-side text-white text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black italic text-orange-500 uppercase tracking-tighter leading-none">Je Garage Pro</h1>
                <p class="text-[8px] text-zinc-500 font-bold uppercase mt-1">v7.2 | Nota Official</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="window.loadAll()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-orange-500 flex items-center justify-center active:scale-95"><i class="fa-solid fa-sync"></i></button>
            <button onclick="window.eksekusiLogout()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-red-500 flex items-center justify-center active:scale-95"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </header>

    <nav class="flex gap-6 border-b border-zinc-900 mb-8 overflow-x-auto no-scrollbar">
        <div id="btn-tab-database" onclick="window.switchTab('tab-database')" class="tab active">Database</div>
        <div id="btn-tab-servis" onclick="window.switchTab('tab-servis')" class="tab">Workshop</div>
        <div id="btn-tab-stok" onclick="window.switchTab('tab-stok')" class="tab">Gudang</div>
        <div id="btn-tab-finance" onclick="window.switchTab('tab-finance')" class="tab">Laporan</div>
    </nav>

    <div id="tab-database" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('pelanggan')" class="orange-gradient w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase shadow-lg">+ Pelanggan Baru</button>
                <div id="list-pelanggan" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
            </div>
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('kendaraan')" class="bg-zinc-800 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase border border-zinc-700">+ Unit Baru</button>
                <div id="list-kendaraan" class="space-y-3 mt-4 max-h-[400px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <div id="tab-servis" class="tab-content hidden">
        <div class="mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
                <input type="text" id="search-workshop" placeholder="Cari Plat atau Nama..." class="pl-12 text-xs italic" oninput="window.filterWorkshop()">
            </div>
        </div>
        <div id="list-pro-workshop" class="space-y-4"></div>
    </div>
    
    <div id="tab-stok" class="tab-content hidden">
        <button onclick="window.openModal('stok')" class="bg-blue-600 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase tracking-widest">+ Stok Gudang</button>
        <div class="grid grid-cols-2 gap-4" id="list-stok"></div>
    </div>

    <div id="tab-finance" class="tab-content hidden">
        <div class="flex gap-3 mb-6">
            <select id="filter-finance" onchange="window.loadAll()" class="text-xs flex-1">
                <option value="hari">Hari Ini</option>
                <option value="bulan">Bulan Ini</option>
                <option value="semua">Semua Waktu</option>
            </select>
            <button onclick="window.printReport()" class="bg-zinc-800 px-4 rounded-xl text-[10px] font-bold uppercase border border-zinc-700"><i class="fa-solid fa-print"></i></button>
        </div>
        <div id="finance-stats" class="grid grid-cols-2 gap-3 mb-6"></div>
        <div class="card-dark rounded-3xl p-5">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 tracking-widest italic">Riwayat Transaksi</h3>
            <div id="table-finance-body" class="space-y-4"></div>
        </div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-md">
    <div class="card-dark w-full max-w-lg p-6 rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 id="modal-title" class="text-xl font-bold text-orange-500 mb-6 italic uppercase">Modal</h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex flex-col gap-2 mt-8">
            <button id="btn-execute" class="orange-gradient py-4 rounded-xl font-black text-xs uppercase tracking-widest">Simpan Data</button>
            <button onclick="window.closeModal()" class="bg-zinc-900 py-4 rounded-xl font-bold text-xs text-zinc-500 uppercase tracking-widest">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);

    const MASTER_PASS = "cuma123"; 
    let keranjang = [];
    let dataServisMaster = []; 

    const eksekusiLogin = () => {
        const input = document.getElementById('pass-input').value.trim();
        if(input === MASTER_PASS) {
            localStorage.setItem('garage_session', 'active');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            window.loadAll();
        } else {
            document.getElementById('login-msg').classList.remove('hidden');
        }
    };

    window.eksekusiLogout = () => {
        if(confirm("Keluar aplikasi?")) {
            localStorage.removeItem('garage_session');
            location.reload();
        }
    };

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    };

    window.closeModal = () => { document.getElementById('modal-container').classList.add('hidden'); keranjang = []; };

    window.hapusData = async (table, id) => {
        if(confirm(`Hapus data secara permanen?`)) {
            await supabase.from(table).delete().eq('id', id);
            window.loadAll();
        }
    };

    window.filterWorkshop = () => {
        const q = document.getElementById('search-workshop').value.toLowerCase();
        const filtered = dataServisMaster.filter(x => x.kendaraan?.plat.toLowerCase().includes(q) || x.kendaraan?.pelanggan?.nama.toLowerCase().includes(q));
        window.renderWorkshopList(filtered);
    };

    window.renderWorkshopList = (list) => {
        document.getElementById('list-pro-workshop').innerHTML = list.map(x => {
            const tot = (x.jasa_service || 0) + (x.biaya_sparepart || 0);
            const sisa = tot - (x.uang_muka || 0);
            return `<div class="card-dark p-6 rounded-[2rem] border-l-4 ${sisa > 0 ? 'border-red-600' : 'border-emerald-600'}">
                <div class="flex justify-between items-start">
                    <div><h3 class="text-xl font-black text-orange-500 italic">${x.kendaraan?.plat}</h3><p class="text-[10px] text-zinc-600 uppercase font-bold">${x.kendaraan?.pelanggan?.nama || '-'}</p></div>
                    <div class="flex gap-4">
                        <button onclick="window.hapusData('servis', '${x.id}')" class="text-zinc-700 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                        <button onclick="window.printNotaFull('${x.id}')" class="text-orange-500"><i class="fa-solid fa-print"></i></button>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-end pt-3 border-t border-white/5">
                    <div class="flex-1 mr-4"><p class="text-[10px] opacity-40 italic truncate">${x.keluhan}</p>${sisa > 0 ? `<button onclick="window.bayarSisaModal('${x.id}', ${sisa})" class="bg-red-600/20 text-red-500 px-3 py-1 rounded-lg text-[9px] font-black mt-2">LUNASI</button>` : '<span class="text-emerald-500 text-[10px] font-bold italic uppercase tracking-widest">LUNAS</span>'}</div>
                    <div class="text-right"><p class="font-black ${sisa > 0 ? 'text-red-500' : 'text-emerald-500'} text-sm italic">Rp ${sisa.toLocaleString()}</p></div>
                </div></div>`;
        }).join('');
    };

    window.loadAll = async () => {
        try {
            const { data: p } = await supabase.from('pelanggan').select('*').order('nama');
            const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending: false});
            const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
            const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');

            dataServisMaster = s || [];
            window.renderWorkshopList(dataServisMaster);

            document.getElementById('list-pelanggan').innerHTML = (p || []).map(i => `<div class="bg-zinc-900 p-4 rounded-2xl border border-white/5 flex justify-between items-center"><span class="text-xs font-bold uppercase">${i.nama}</span><button onclick="window.hapusData('pelanggan', '${i.id}')" class="text-zinc-800"><i class="fa-solid fa-trash-can"></i></button></div>`).join('');
            document.getElementById('list-kendaraan').innerHTML = (k || []).map(i => `<div class="bg-zinc-900/40 p-4 rounded-xl flex justify-between items-center border border-zinc-900 mb-2"><div><p class="text-orange-500 font-bold">${i.plat}</p><p class="text-[9px] text-zinc-600 uppercase font-bold">${i.pelanggan?.nama}</p></div><div class="flex gap-3 items-center"><button onclick="window.hapusData('kendaraan', '${i.id}')" class="text-zinc-800"><i class="fa-solid fa-trash-can"></i></button><button onclick="window.openModal('servis', '${i.id}')" class="bg-orange-600 text-white px-3 py-1 rounded-lg text-[9px] font-black uppercase">Servis</button></div></div>`).join('');
            document.getElementById('list-stok').innerHTML = (st || []).map(i => `<div class="card-dark p-4 rounded-3xl border-l-4 ${i.jumlah_stok < 5 ? 'border-red-600' : 'border-blue-500'} flex justify-between items-center"><div><p class="text-[9px] uppercase text-zinc-400 font-bold mb-1">${i.nama_barang}</p><h4 class="text-lg font-black italic">${i.jumlah_stok} <span class="text-[10px] opacity-50">${i.satuan || 'Pcs'}</span></h4></div><button onclick="window.hapusData('stok_sparepart', '${i.id}')" class="text-zinc-800"><i class="fa-solid fa-trash-can"></i></button></div>`).join('');

            const filter = document.getElementById('filter-finance').value;
            const now = new Date();
            const filteredS = dataServisMaster.filter(x => {
                const d = new Date(x.created_at);
                if(filter === 'hari') return d.toDateString() === now.toDateString();
                if(filter === 'bulan') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                return true;
            });
            let piutang = 0, tunai = 0, transfer = 0;
            filteredS.forEach(x => { if(x.metode_bayar === 'Transfer') transfer += parseInt(x.uang_muka || 0); else tunai += parseInt(x.uang_muka || 0); });
            dataServisMaster.forEach(x => piutang += ((parseInt(x.jasa_service || 0)+parseInt(x.biaya_sparepart || 0)) - parseInt(x.uang_muka || 0)));
            
            document.getElementById('finance-stats').innerHTML = `<div class="col-span-2 card-dark p-6 rounded-3xl border-l-4 border-red-600"><p class="text-[9px] uppercase font-bold text-zinc-400">Total Piutang</p><h2 class="text-2xl font-black text-red-500 tracking-tighter">Rp ${piutang.toLocaleString()}</h2></div><div class="card-dark p-4 rounded-2xl border-l-4 border-emerald-600"><p class="text-[9px] uppercase font-bold text-zinc-500">Tunai</p><h2 class="font-bold text-emerald-500">Rp ${tunai.toLocaleString()}</h2></div><div class="card-dark p-4 rounded-2xl border-l-4 border-blue-600"><p class="text-[9px] uppercase font-bold text-zinc-500">Bank</p><h2 class="font-bold text-blue-500">Rp ${transfer.toLocaleString()}</h2></div>`;
            document.getElementById('table-finance-body').innerHTML = filteredS.map(x => `<div class="flex justify-between items-center border-b border-white/5 pb-3"><div><p class="text-xs font-bold">${x.kendaraan?.plat || 'No Plat'}</p><p class="text-[9px] text-zinc-500 italic">${new Date(x.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} | ${x.metode_bayar}</p></div><p class="text-xs font-black text-emerald-500 italic">Rp ${parseInt(x.uang_muka || 0).toLocaleString()}</p></div>`).join('');
        } catch (e) {}
    };

    window.openModal = async (type, id = null) => {
        const body = document.getElementById('modal-body'), title = document.getElementById('modal-title'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        if(type === 'pelanggan') {
            title.innerText = "Pelanggan Baru"; body.innerHTML = `<input id="inp-nama" placeholder="Nama Lengkap">`;
            btn.onclick = async () => { await supabase.from('pelanggan').insert([{ nama: document.getElementById('inp-nama').value }]); window.closeModal(); window.loadAll(); };
        } else if(type === 'kendaraan') {
            title.innerText = "Unit Baru";
            const { data: pList } = await supabase.from('pelanggan').select('*').order('nama');
            body.innerHTML = `<select id="sel-pel">${pList?.map(x => `<option value="${x.id}">${x.nama}</option>`).join('')}</select><input id="inp-plat" class="uppercase" placeholder="Plat Nomor">`;
            btn.onclick = async () => { await supabase.from('kendaraan').insert([{ pelanggan_id: document.getElementById('sel-pel').value, plat: document.getElementById('inp-plat').value.toUpperCase() }]); window.closeModal(); window.loadAll(); };
        } else if(type === 'servis') {
            title.innerText = "Input Workshop";
            body.innerHTML = `<input id="v-kel" placeholder="Pekerjaan"><input id="v-jasa" type="number" placeholder="Jasa (Rp)" oninput="window.calc()"><div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800"><p class="text-[9px] text-zinc-500 mb-2 uppercase font-bold tracking-widest">Sparepart</p>
