<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JE Garage Pro v6.9.6 - Workshop Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.9)), 
                        url('https://i.postimg.cc/xCDV3vRZ/car-automobile-repair-shop-engine-motor-vehicle-service-maintenance-auto-parts-6c3120919a9a891118831.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; margin: 0; -webkit-tap-highlight-color: transparent; 
        }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .card-dark { background: rgba(25, 25, 25, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .tab.active { color: #f97316; border-bottom: 3px solid #f97316; opacity: 1; }
        .tab { opacity: 0.4; cursor: pointer; padding-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
        input, select, textarea { background: rgba(15, 15, 15, 0.9) !important; color: white !important; border: 1px solid #333 !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

<div id="dashboard-content" class="max-w-4xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-car text-white text-2xl"></i></div>
            <div>
                <h1 class="text-xl font-black italic text-orange-500 uppercase tracking-tighter leading-none">Garage Pro</h1>
                <p class="text-[8px] text-zinc-400 font-bold uppercase mt-1">v6.9.6 • Workshop System</p>
            </div>
        </div>
        <button onclick="window.loadAll()" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 text-orange-500"><i class="fa-solid fa-rotate"></i></button>
    </header>

    <nav class="flex gap-6 border-b border-white/5 mb-8 overflow-x-auto no-scrollbar">
        <div id="btn-tab-database" onclick="window.switchTab('tab-database')" class="tab active">Database</div>
        <div id="btn-tab-servis" onclick="window.switchTab('tab-servis')" class="tab">Workshop</div>
        <div id="btn-tab-stok" onclick="window.switchTab('tab-stok')" class="tab">Gudang</div>
    </nav>

    <div id="tab-database" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('pelanggan')" class="orange-gradient w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase">+ PELANGGAN</button>
                <div id="list-pelanggan" class="space-y-2"></div>
            </div>
            <div class="card-dark p-5 rounded-[2rem]">
                <button onclick="window.openModal('kendaraan')" class="bg-zinc-800 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase">+ UNIT BARU</button>
                <div id="list-kendaraan" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="tab-servis" class="tab-content hidden">
        <div id="list-pro-workshop" class="space-y-4"></div>
    </div>
    
    <div id="tab-stok" class="tab-content hidden">
        <button onclick="window.openModal('stok')" class="bg-blue-600/60 w-full py-4 rounded-2xl font-black mb-6 text-[10px] uppercase tracking-widest">+ STOK BARANG</button>
        <div class="grid grid-cols-2 gap-4" id="list-stok"></div>
    </div>
</div>

<div id="modal-container" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-md">
    <div class="card-dark w-full max-w-lg p-6 rounded-[2.5rem] max-h-[90vh] overflow-y-auto">
        <h3 id="modal-title" class="text-xl font-bold text-orange-500 mb-6 uppercase italic">Modal</h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex flex-col gap-2 mt-8">
            <button id="btn-execute" class="orange-gradient py-4 rounded-xl font-black text-[10px] uppercase">Simpan</button>
            <button onclick="window.closeModal()" class="bg-zinc-900 py-4 rounded-xl font-bold text-[10px] text-zinc-500 uppercase">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    
    const SB_URL = "https://lxbfgnobjaqxojggjonh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmZnbm9iamFxeG9qZ2dqb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjIxMDUsImV4cCI6MjA5MTk5ODEwNX0.GbY962sK8VFCShqlvW7olRnWtJMkLlr3f1NuSc2kV6E";
    const supabase = createClient(SB_URL, SB_KEY);

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    };

    window.closeModal = () => { document.getElementById('modal-container').classList.add('hidden'); };

    window.loadAll = async () => {
        const { data: p } = await supabase.from('pelanggan').select('*').order('nama');
        const { data: k } = await supabase.from('kendaraan').select('*, pelanggan(*)').order('created_at', {ascending: false});
        const { data: s } = await supabase.from('servis').select('*, kendaraan(*, pelanggan(*))').order('created_at', {ascending: false});
        const { data: st } = await supabase.from('stok_sparepart').select('*').order('nama_barang');

        document.getElementById('list-pelanggan').innerHTML = (p || []).map(i => `<div class="bg-white/5 p-3 rounded-xl border border-white/5 text-sm">${i.nama}</div>`).join('');
        
        // TOMBOL SERVIS DIKEMBALIKAN KE SINI
        document.getElementById('list-kendaraan').innerHTML = (k || []).map(i => `
            <div class="bg-white/5 p-4 rounded-xl flex justify-between items-center border border-white/5">
                <div>
                    <p class="text-xs font-black text-orange-500">${i.plat}</p>
                    <p class="text-[9px] text-zinc-400 uppercase">${i.merek || '-'} • ${i.pelanggan?.nama || '-'}</p>
                </div>
                <button onclick="window.openModal('servis', '${i.id}')" class="bg-orange-600/20 text-orange-500 px-4 py-2 rounded-lg text-[9px] font-black uppercase">Servis</button>
            </div>`).join('');

        document.getElementById('list-pro-workshop').innerHTML = (s || []).map(x => `
            <div class="card-dark p-6 rounded-[2rem] border-l-4 border-orange-500">
                <div class="flex justify-between">
                    <div>
                        <h3 class="text-lg font-black text-orange-500">${x.kendaraan?.plat}</h3>
                        <p class="text-[10px] text-zinc-500">${x.kendaraan?.pelanggan?.nama || '-'}</p>
                    </div>
                    <div class="text-right text-[10px] font-bold text-zinc-400 italic">${new Date(x.created_at).toLocaleDateString()}</div>
                </div>
                <div class="mt-4 p-3 bg-black/20 rounded-xl">
                    <p class="text-xs text-zinc-300 italic">"${x.keluhan}"</p>
                </div>
            </div>`).join('');

        document.getElementById('list-stok').innerHTML = (st || []).map(i => `<div class="card-dark p-4 rounded-2xl border-l-4 border-blue-500"><p class="text-[8px] text-zinc-500 uppercase font-bold">${i.nama_barang}</p><h4 class="text-lg font-black italic">${i.jumlah_stok} <span class="text-[9px] opacity-30">${i.satuan}</span></h4></div>`).join('');
    };

    window.openModal = async (type, id = null) => {
        const body = document.getElementById('modal-body'), title = document.getElementById('modal-title'), btn = document.getElementById('btn-execute');
        document.getElementById('modal-container').classList.remove('hidden');
        body.innerHTML = `<p class="text-center text-orange-500 animate-pulse py-4">LOADING...</p>`;

        if(type === 'pelanggan') {
            title.innerText = "Tambah Pelanggan";
            body.innerHTML = `<input id="inp-nama" placeholder="Nama Lengkap">`;
            btn.onclick = async () => {
                await supabase.from('pelanggan').insert([{ nama: document.getElementById('inp-nama').value }]);
                window.closeModal(); window.loadAll();
            };
        } else if(type === 'kendaraan') {
            title.innerText = "Tambah Unit";
            const { data: listP } = await supabase.from('pelanggan').select('*').order('nama');
            body.innerHTML = `
                <select id="sel-pel">${listP.map(x => `<option value="${x.id}">${x.nama.toUpperCase()}</option>`).join('')}</select>
                <input id="inp-merek" placeholder="Merek Mobil" class="mt-3">
                <input id="inp-plat" placeholder="Plat Nomor" class="mt-3 uppercase">
            `;
            btn.onclick = async () => {
                await supabase.from('kendaraan').insert([{ pelanggan_id: document.getElementById('sel-pel').value, merek: document.getElementById('inp-merek').value, plat: document.getElementById('inp-plat').value.toUpperCase() }]);
                window.closeModal(); window.loadAll();
            };
        } else if(type === 'servis') {
            title.innerText = "Input Workshop";
            body.innerHTML = `
                <textarea id="v-kel" placeholder="Keterangan Kerusakan / Pekerjaan" rows="3"></textarea>
                <input id="v-jasa" type="number" placeholder="Biaya Jasa (Rp)" class="mt-3">
                <p class="text-[9px] text-zinc-500 italic mt-2">*Sparepart bisa ditambahkan di menu gudang</p>
            `;
            btn.onclick = async () => {
                await supabase.from('servis').insert([{ 
                    kendaraan_id: id, 
                    keluhan: document.getElementById('v-kel').value, 
                    jasa_service: document.getElementById('v-jasa').value || 0 
                }]);
                window.closeModal(); 
                window.switchTab('tab-servis');
                window.loadAll();
            };
        } else if(type === 'stok') {
            title.innerText = "Stok Baru";
            body.innerHTML = `<input id="s-nama" placeholder="Barang"><input id="s-satuan" placeholder="Pcs/Ltr" class="mt-3"><input id="s-jumlah" type="number" placeholder="Jumlah" class="mt-3">`;
            btn.onclick = async () => {
                await supabase.from('stok_sparepart').insert([{ nama_barang: document.getElementById('s-nama').value, satuan: document.getElementById('s-satuan').value, jumlah_stok: document.getElementById('s-jumlah').value }]);
                window.closeModal(); window.loadAll();
            };
        }
    };

    window.loadAll();
</script>
</body>
</html>
